<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 100" width="360" height="100" role="img" aria-labelledby="title desc">
  <title id="title">LabCTL logo</title>
  <desc id="desc">A dark rounded node-stack mark followed by the LabCTL wordmark.</desc>
  <defs>
    <linearGradient id="stack-face" x1="18" y1="14" x2="82" y2="86" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="0.45" stop-color="#0E7490"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="stack-edge" x1="20" y1="76" x2="84" y2="18" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#06B6D4"/>
      <stop offset="1" stop-color="#67E8F9"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <g filter="url(#soft-shadow)">
    <rect x="6" y="8" width="84" height="84" rx="26" fill="#06090F" stroke="#1F2A40" stroke-width="2"/>
    <path d="M28 30 L50 20 L72 30 L50 40 Z" fill="url(#stack-edge)"/>
    <path d="M28 44 L50 34 L72 44 L50 54 Z" fill="#0E7490" opacity="0.92"/>
    <path d="M28 58 L50 48 L72 58 L50 68 Z" fill="url(#stack-face)"/>
    <path d="M28 30 L50 40 L50 68 L28 58 Z" fill="#0F172A" opacity="0.72"/>
    <path d="M72 30 L50 40 L50 68 L72 58 Z" fill="#06B6D4" opacity="0.26"/>
    <circle cx="50" cy="44" r="4.5" fill="#ECFEFF"/>
    <circle cx="50" cy="44" r="2.2" fill="#06B6D4"/>
  </g>

  <text x="108" y="68"
        font-family="Onest, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
        font-size="46" font-weight="500" letter-spacing="-1.15" fill="#C3D4E2">Lab</text>
  <text x="190" y="68"
        font-family="Onest, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
        font-size="46" font-weight="800" letter-spacing="-1.15" fill="#38BDF8">CTL</text>
</svg>
