              <select className="select input" value={form.host_id}
                onChange={e => {
                  const hid = e.target.value;
                  const h = hosts.find(x => x.id === hid);
                  const detectedDomain = h?.system_info?.domain || '';
                  setForm(f => ({ ...f, host_id: hid, domain: detectedDomain }));
                }}>
                <option value="">Select host...</option>
                {hosts.map(h => <option key={h.id} value={h.id}>{h.hostname}</option>)}
              </select>
            </div>
          </div>
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">Username</label>
              <input className="input" placeholder="User Name"
                value={form.username} onChange={e => setForm(f => ({ ...f, username: e.target.value }))}/>
            </div>
            <div className="form-group">
              <label className="form-label">Password</label>
              <input className="input" type="password"
                value={form.password} onChange={e => setForm(f => ({ ...f, password: e.target.value }))}/>
            </div>
          </div>
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">Domain {form.domain && <span style={{ color: 'var(--green)', fontSize: 10 }}>(auto-detected)</span>}</label>
              <input className="input" placeholder="e.g. domain.local"
                value={form.domain || ''} onChange={e => setForm(f => ({ ...f, domain: e.target.value }))}/>
            </div>
          </div>
          <div className="btn-group" style={{ justifyContent: 'flex-end', marginTop: 16 }}>
            <button className="btn" onClick={() => setShowAdd(false)}>Cancel</button>
            <button className="btn btn-primary" onClick={save}>Save</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── Cron/Task List Component ─────────────────────────────
function CronTaskList({ tasks, isWindows, onRefresh, onAction, onRunNow, hostname }) {
  const [expanded, setExpanded] = useState(null);
  const [showSystem, setShowSystem] = useState(false);

  // Filter system tasks for Windows
  const systemPaths = ['\\Microsoft\\', '\\Windows\\', '\\MicrosoftEdge', '\\Mozilla\\', '\\Google\\', '\\Adobe\\'];
  const filtered = isWindows && !showSystem
    ? tasks.filter(t => {
        const path = (t.TaskPath || '').toLowerCase();
        return !systemPaths.some(sp => path.includes(sp.toLowerCase()));
      })
    : tasks;

  return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <span style={{ fontSize: 13, fontWeight: 600 }}>{filtered.length} {isWindows ? 'Scheduled Tasks' : 'Crons / Timers'}</span>
          {isWindows && tasks.length !== filtered.length && (
            <span style={{ fontSize: 10, color: 'var(--text-dim)' }}>({tasks.length - filtered.length} system tasks hidden)</span>
          )}
        </div>
        <div className="btn-group">
          {isWindows && (
            <button className="btn btn-sm" onClick={() => setShowSystem(!showSystem)}>
              {showSystem ? 'Hide System' : 'Show System'}
            </button>
          )}
          <button className="btn btn-sm" onClick={onRefresh}><Icons.RefreshCw/> Refresh</button>
          <button className="btn btn-sm" onClick={() => {
            const text = isWindows ? JSON.stringify(tasks, null, 2) : tasks.map(t => t.raw).join('\n');
            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url;
            a.download = `${hostname}-crons.txt`; a.click(); URL.revokeObjectURL(url);
          }}><Icons.Download/> Download</button>
        </div>
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
        {filtered.map((t, i) => {
          const name = isWindows ? (t.TaskName || t.Name || `Task ${i}`) : (t.name || `Entry ${i}`);
          const isExp = expanded === i;
          const stateReady = isWindows ? (t.State === 'Ready' || t.State === 3 || t.State === 'ready') : (t.type === 'timer');
          return (
            <div key={i} style={{
              background: 'var(--bg-primary)', border: '1px solid var(--border)', borderRadius: 6,
              overflow: 'hidden'
            }}>
              <div onClick={() => setExpanded(isExp ? null : i)} style={{
                display: 'flex', alignItems: 'center', gap: 8, padding: '8px 12px', cursor: 'pointer',
                borderLeft: `3px solid ${stateReady ? 'var(--green)' : 'var(--text-dim)'}`
              }}>
                <span style={{ fontSize: 12, fontWeight: 600, flex: 1, fontFamily: 'JetBrains Mono, monospace' }}>{name}</span>
                {isWindows && <StatusBadge status={stateReady ? 'online' : 'offline'}/>}
                {!isWindows && t.type === 'timer' && <span className="badge badge-running"><span className="badge-dot"/>timer</span>}
                {!isWindows && t.type === 'cron' && <span className="badge badge-pending"><span className="badge-dot"/>cron</span>}
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{
                  width: 14, height: 14, color: 'var(--text-dim)',
                  transform: isExp ? 'rotate(180deg)' : 'rotate(0deg)', transition: 'transform 0.15s'
                }}><polyline points="6 9 12 15 18 9"/></svg>
              </div>
              {isExp && (
                <div style={{ padding: '8px 12px', borderTop: '1px solid var(--border)', background: 'var(--bg-card)' }}>
                  {isWindows && (
                    <>
                      <div style={{ fontSize: 11, marginBottom: 4 }}><span style={{ color: 'var(--text-dim)' }}>Path: </span><span className="mono">{t.TaskPath || ''}</span></div>
                      <div style={{ fontSize: 11, marginBottom: 4 }}><span style={{ color: 'var(--text-dim)' }}>State: </span>{t.State}</div>
                      <div style={{ fontSize: 11, marginBottom: 4 }}><span style={{ color: 'var(--text-dim)' }}>Next Run: </span>{t.NextRun ? new Date(t.NextRun).toLocaleString() : 'N/A'}</div>
                      {t.LastRun && <div style={{ fontSize: 11, marginBottom: 4 }}><span style={{ color: 'var(--text-dim)' }}>Last Run: </span>{new Date(t.LastRun).toLocaleString()}</div>}
                      {t.Description && <div style={{ fontSize: 11, marginBottom: 4 }}><span style={{ color: 'var(--text-dim)' }}>Description: </span>{t.Description}</div>}
                    </>
                  )}
                  {!isWindows && (
                    <>
                      {t.schedule && <div style={{ fontSize: 11, marginBottom: 4 }}><span style={{ color: 'var(--text-dim)' }}>Schedule: </span><span className="mono">{t.schedule}</span></div>}
                      {t.command && <div style={{ fontSize: 11, marginBottom: 4 }}><span style={{ color: 'var(--text-dim)' }}>Command: </span><span className="mono" style={{ wordBreak: 'break-all' }}>{t.command}</span></div>}
                      {t.details && <div style={{ fontSize: 11, marginBottom: 4 }}><span style={{ color: 'var(--text-dim)' }}>Details: </span>{t.details}</div>}
                      <div style={{ fontSize: 10, color: 'var(--text-dim)', marginBottom: 4, fontFamily: 'JetBrains Mono, monospace' }}>{t.raw}</div>
                    </>
                  )}
                  <div className="btn-group" style={{ marginTop: 8 }}>
                    {onRunNow && (isWindows || (t.type === 'timer')) && (
                      <button className="btn btn-sm btn-primary" onClick={(e) => { e.stopPropagation(); onRunNow(isWindows ? (t.TaskPath || '') + (t.TaskName || '') : t.name); }}>
                        <Icons.Play/> Run Now
                      </button>
                    )}
                    {onAction && isWindows && (
                      <>
                        <button className="btn btn-sm" onClick={(e) => { e.stopPropagation(); onAction(t.TaskPath ? t.TaskPath + t.TaskName : t.TaskName, 'enable'); }}>Enable</button>
                        <button className="btn btn-sm" onClick={(e) => { e.stopPropagation(); onAction(t.TaskPath ? t.TaskPath + t.TaskName : t.TaskName, 'disable'); }}>Disable</button>
                      </>
                    )}
                    {onAction && !isWindows && t.type === 'timer' && (
                      <>
                        <button className="btn btn-sm" onClick={(e) => { e.stopPropagation(); onAction(t.name, 'start'); }}>Start</button>
                        <button className="btn btn-sm" onClick={(e) => { e.stopPropagation(); onAction(t.name, 'stop'); }}>Stop</button>
                        <button className="btn btn-sm" onClick={(e) => { e.stopPropagation(); onAction(t.name, 'restart'); }}>Restart</button>
                      </>
                    )}
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── Host Detail Modal ─────────────────────────────────────
function HostDetailModal({ host, onClose, addToast }) {
  const [jobs, setJobs] = useState([]);
  const [activeTab, setActiveTab] = useState('overview');
  const [viewJob, setViewJob] = useState(null);

  const info = host.system_info || {};
  const isOnline = host.online || host.status === 'online';
  const isWindows = (host.os || '').toLowerCase().includes('windows');
  const isLinux = !isWindows;

  useEffect(() => {
    api(`/api/jobs?host_id=${host.id}&limit=50`).then(setJobs).catch(() => {});
    const i = setInterval(() => {
      api(`/api/jobs?host_id=${host.id}&limit=50`).then(setJobs).catch(() => {});
    }, 5000);
    return () => clearInterval(i);
  }, [host.id]);

  const runJob = async (type, params = {}) => {
    await api('/api/jobs', { method: 'POST', body: { host_id: host.id, type, params }});
    addToast(`${type} dispatched to ${host.hostname}`);
  };

  const lastJobOfType = (type) => jobs.find(j => j.type === type && j.status === 'completed');
  const ramPercent = info.ram_mb != null && info.ram_available_mb != null && info.ram_mb > 0 ? Math.round(((info.ram_mb - info.ram_available_mb) / info.ram_mb) * 100) : null;
  const diskPercent = info.disk_total_gb && info.disk_free_gb ? Math.round(((info.disk_total_gb - info.disk_free_gb) / info.disk_total_gb) * 100) : null;

  const ProgressBar = ({ percent, color }) => (
    <div style={{ background: 'var(--bg-primary)', borderRadius: 4, height: 6, width: '100%', overflow: 'hidden' }}>
      <div style={{ width: `${percent}%`, height: '100%', borderRadius: 4, background: percent > 85 ? 'var(--red)' : percent > 65 ? 'var(--yellow)' : color || 'var(--accent)', transition: 'width 0.3s' }}/>
    </div>
  );

  const InfoRow = ({ label, value, mono }) => (
    <div style={{ display: 'flex', justifyContent: 'space-between', padding: '6px 0', borderBottom: '1px solid var(--border)' }}>
      <span style={{ fontSize: 12, color: 'var(--text-dim)' }}>{label}</span>
      <span style={{ fontSize: 12, color: 'var(--text-primary)', fontFamily: mono ? 'JetBrains Mono, monospace' : 'inherit' }}>{value || '\u2014'}</span>
    </div>
  );

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()} style={{ maxWidth: 700, maxHeight: '90vh' }}>
        {/* Header */}
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 16 }}>
          <div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 4 }}>
              <span style={{ fontSize: 18, fontWeight: 700 }}>{host.hostname}</span>
              <StatusBadge status={isOnline ? 'online' : 'offline'}/>
            </div>
            <div style={{ fontSize: 12, color: 'var(--text-dim)', fontFamily: 'JetBrains Mono, monospace' }}>
              {host.os} &middot; {host.ip || info.ip} &middot; {info.platform || ''}
            </div>
          </div>
          <button className="btn-close" onClick={onClose}><Icons.X/></button>
        </div>

        {/* Tabs */}
        <div className="tabs">
          {['overview','jobs','crons/tasks','quick actions'].map(t => (
            <div key={t} className={`tab ${activeTab === t ? 'active' : ''}`} onClick={() => setActiveTab(t)}>
              {t.charAt(0).toUpperCase() + t.slice(1)}
            </div>
          ))}
        </div>

        {/* Overview Tab */}
        {activeTab === 'overview' && (
          <div>
            {/* RAM */}
            <div className="card" style={{ padding: 12, marginBottom: 12 }}>
              <div style={{ fontSize: 11, color: 'var(--text-dim)', marginBottom: 6 }}>RAM Usage</div>
              {ramPercent !== null ? (
                <>
                  <ProgressBar percent={ramPercent}/>
                  <div style={{ fontSize: 11, color: 'var(--text-secondary)', marginTop: 4 }}>
                    {Math.round((info.ram_mb - info.ram_available_mb) / 1024 * 10) / 10}GB / {Math.round(info.ram_mb / 1024 * 10) / 10}GB ({ramPercent}%)
                  </div>
                </>
              ) : <span style={{ fontSize: 12, color: 'var(--text-dim)' }}>N/A</span>}
            </div>

            {/* All Drives */}
            <div className="card" style={{ padding: 12, marginBottom: 12 }}>
              <div style={{ fontSize: 12, fontWeight: 700, marginBottom: 8, color: 'var(--text-secondary)' }}>Drives</div>
              {(info.drives && info.drives.length > 0) ? info.drives.map((drv, i) => (
                <div key={i} style={{ marginBottom: i < info.drives.length - 1 ? 10 : 0 }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4 }}>
                    <span style={{ fontSize: 11, fontFamily: 'JetBrains Mono, monospace', color: 'var(--text-primary)' }}>
                      {drv.device} ({drv.mount})
                    </span>
                    <span style={{ fontSize: 11, color: 'var(--text-dim)' }}>
                      {drv.free_gb}GB free / {drv.total_gb}GB
                    </span>
                  </div>
                  <ProgressBar percent={drv.percent || 0}/>
                </div>
              )) : (
                diskPercent !== null ? (
                  <div>
                    <ProgressBar percent={diskPercent}/>
                    <div style={{ fontSize: 11, color: 'var(--text-secondary)', marginTop: 4 }}>
                      {Math.round((info.disk_total_gb - info.disk_free_gb) * 10) / 10}GB / {info.disk_total_gb}GB ({diskPercent}%)
                    </div>
                  </div>
                ) : <span style={{ fontSize: 12, color: 'var(--text-dim)' }}>N/A</span>
              )}
            </div>

            {/* System Info */}
            <div className="card" style={{ padding: 12 }}>
              <div style={{ fontSize: 12, fontWeight: 700, marginBottom: 8, color: 'var(--text-secondary)' }}>System Info</div>
              <InfoRow label="Hostname" value={info.hostname || host.hostname} mono/>
              <InfoRow label="OS" value={host.os}/>
              <InfoRow label="Platform" value={info.platform}/>
              <InfoRow label="Architecture" value={info.arch}/>
              <InfoRow label="CPU Cores" value={info.cpus} mono/>
              <InfoRow label="IP Address" value={host.ip || info.ip} mono/>
              {info.domain && <InfoRow label="Domain" value={info.domain} mono/>}
              <InfoRow label="Uptime" value={info.uptime_hours ? `${info.uptime_hours} hours (${Math.round(info.uptime_hours / 24)} days)` : null}/>
              <InfoRow label="Last Seen" value={host.last_seen ? new Date(host.last_seen).toLocaleString() : null}/>
              <InfoRow label="Agent ID" value={host.id} mono/>
            </div>

            {/* Docker containers with details */}
            {info.docker_details && info.docker_details.length > 0 && (
              <div className="card" style={{ padding: 12 }}>
                <div style={{ fontSize: 12, fontWeight: 700, marginBottom: 8, color: 'var(--text-secondary)' }}>
                  Docker Containers ({info.docker_running} running)
                </div>
                <div className="table-wrap">
                  <table style={{ fontSize: 11 }}>
                    <thead><tr><th>Name</th><th>Image</th><th>Status</th><th>Ports</th></tr></thead>
                    <tbody>
                      {info.docker_details.map((c, i) => (
                        <tr key={i}>
                          <td style={{ fontFamily: 'JetBrains Mono, monospace', color: 'var(--green)' }}>{c.name}</td>
                          <td style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 10 }}>{c.image}</td>
                          <td>{c.status}</td>
                          <td style={{ fontSize: 10 }}>{c.ports || '\u2014'}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}
            {info.docker_containers && info.docker_containers.length > 0 && !info.docker_details && (
              <div className="card" style={{ padding: 12 }}>
                <div style={{ fontSize: 12, fontWeight: 700, marginBottom: 8, color: 'var(--text-secondary)' }}>
                  Docker Containers ({info.docker_running} running)
                </div>
                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
                  {info.docker_containers.map(c => (
                    <span key={c} style={{
                      background: 'var(--bg-primary)', border: '1px solid var(--border)',
                      borderRadius: 4, padding: '3px 8px', fontSize: 11,
                      fontFamily: 'JetBrains Mono, monospace', color: 'var(--green)'
                    }}>{c}</span>
                  ))}
                </div>
              </div>
            )}

            {/* Last job results */}
            {(() => {
              const cronJob = lastJobOfType('list_crons');
              if (!cronJob) return null;
              return (
                <div className="card" style={{ padding: 12 }}>
                  <div style={{ fontSize: 12, fontWeight: 700, marginBottom: 8, color: 'var(--text-secondary)' }}>
                    {isWindows ? 'Scheduled Tasks' : 'Cron Jobs / Timers'}
                  </div>
                  <div className="output-log" style={{ maxHeight: 200 }}>{cronJob.result}</div>
                </div>
              );
            })()}
          </div>
        )}

        {/* Jobs Tab */}
        {activeTab === 'jobs' && (
          <div>
            <div className="table-wrap">
              <table>
                <thead><tr><th>Status</th><th>Type</th><th>Created</th><th>Actions</th></tr></thead>
                <tbody>
                  {jobs.slice(0, 30).map(job => (
                    <tr key={job.id}>
                      <td><StatusBadge status={job.status}/></td>
                      <td style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 11 }}>{job.type}</td>
                      <td style={{ fontSize: 11, color: 'var(--text-dim)' }}>{job.created_at?.slice(0, 19)}</td>
                      <td>
                        <button className="btn btn-sm" onClick={() => setViewJob(job)}><Icons.Eye/></button>
                      </td>
                    </tr>
                  ))}
                  {jobs.length === 0 && (
                    <tr><td colSpan={4} style={{ textAlign: 'center', padding: 20, color: 'var(--text-dim)' }}>No jobs for this host.</td></tr>
                  )}
                </tbody>
              </table>
            </div>

            {viewJob && (
              <div style={{ marginTop: 12 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8 }}>
                  <StatusBadge status={viewJob.status}/>
                  <span className="mono" style={{ fontSize: 12 }}>{viewJob.type}</span>
                  <span style={{ fontSize: 11, color: 'var(--text-dim)' }}>{viewJob.created_at}</span>
                  <button className="btn-close" style={{ marginLeft: 'auto' }} onClick={() => setViewJob(null)}><Icons.X/></button>
                </div>
                {viewJob.result && <div className="output-log">{viewJob.result}</div>}
                {viewJob.error && <div className="output-log" style={{ borderColor: 'var(--red)' }}>{viewJob.error}</div>}
              </div>
            )}
          </div>
        )}

        {/* Crons/Tasks Tab */}
        {activeTab === 'crons/tasks' && (
          <div>
            {(() => {
              const cronJob = lastJobOfType('list_crons');
              if (!cronJob) {
                return (
                  <div style={{ textAlign: 'center', padding: 30 }}>
                    <div style={{ color: 'var(--text-dim)', marginBottom: 12 }}>No cron/task data yet.</div>
                    <button className="btn btn-primary" onClick={() => runJob('list_crons')}>
                      <Icons.List/> Fetch {isWindows ? 'Scheduled Tasks' : 'Crons/Timers'}
                    </button>
                  </div>
                );
              }

              // Windows tasks - clickable with details
              if (isWindows) {
                try {
                  const tasks = JSON.parse(cronJob.result);
                  const taskList = Array.isArray(tasks) ? tasks : [tasks];
                  return (
                    <CronTaskList
                      tasks={taskList}
                      isWindows={true}
                      onRefresh={() => runJob('list_crons')}
                      onAction={(taskName, action) => runJob('custom_command', {
                        command: `schtasks /Change /TN "${taskName}" /${action === 'enable' ? 'ENABLE' : 'DISABLE'}`
                      })}
                      onRunNow={(taskName) => runJob('custom_command', {
                        command: `schtasks /Run /TN "${taskName}"`
                      })}
                      hostname={host.hostname}
                    />
                  );
                } catch(e) {
                  // Fall through to raw
                }
              }

              // Linux - parse crontab and systemd timers
              const lines = (cronJob.result || '').split('\n');
              const cronEntries = [];
              let section = '';
              lines.forEach(line => {
                const trimmed = line.trim();
                if (trimmed.startsWith('=== ') || trimmed.startsWith('--- ') || trimmed.startsWith('UNIT ') || trimmed === '') {
                  if (trimmed.includes('crontab') || trimmed.includes('Crontab')) section = 'crontab';
                  else if (trimmed.includes('timer') || trimmed.includes('Timer')) section = 'timer';
                  return;
                }
                if (trimmed.startsWith('#') || trimmed === '') return;
                if (section === 'timer' || trimmed.includes('.timer')) {
                  const parts = trimmed.split(/\s+/);
                  cronEntries.push({ type: 'timer', name: parts[0] || trimmed, raw: trimmed, details: parts.slice(1).join(' ') });
                } else if (/^[\d\*\/\-\,]+\s/.test(trimmed)) {
                  const parts = trimmed.split(/\s+/);
                  const schedule = parts.slice(0, 5).join(' ');
                  const command = parts.slice(5).join(' ');
                  cronEntries.push({ type: 'cron', name: command.split('/').pop() || command, raw: trimmed, schedule, command });
                } else {
                  cronEntries.push({ type: 'other', name: trimmed.slice(0, 40), raw: trimmed, details: trimmed });
                }
              });

              if (cronEntries.length > 0) {
                return (
                  <CronTaskList
                    tasks={cronEntries}
                    isWindows={false}
                    onRefresh={() => runJob('list_crons')}
                    onAction={(name, action) => {
                      if (name.includes('.timer')) {
                        runJob('custom_command', { command: `systemctl ${action} ${name}` });
                      }
                    }}
                    onRunNow={(name) => {
                      if (name.includes('.timer')) {
                        const svcName = name.replace('.timer', '.service');
                        runJob('custom_command', { command: `systemctl start ${svcName}` });
                      }
                    }}
                    hostname={host.hostname}
                  />
                );
              }

              // Fallback raw
              return (
                <div>
                  <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 12 }}>
                    <span style={{ fontSize: 13, fontWeight: 600 }}>{isWindows ? 'Scheduled Tasks' : 'Crons / Timers'}</span>
                    <div className="btn-group">
                      <button className="btn btn-sm" onClick={() => runJob('list_crons')}><Icons.RefreshCw/> Refresh</button>
                      <button className="btn btn-sm" onClick={() => {
                        const blob = new Blob([cronJob.result], { type: 'text/plain' });
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a'); a.href = url;
                        a.download = `${host.hostname}-crons.txt`; a.click(); URL.revokeObjectURL(url);
                      }}><Icons.Download/> Download</button>
                    </div>
                  </div>
                  <div className="output-log" style={{ maxHeight: 500 }}>{cronJob.result}</div>
                </div>
              );
            })()}
          </div>
        )}

        {/* Quick Actions Tab */}
        {activeTab === 'quick actions' && (
          <div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 6 }}>
              {isWindows && (
                <>
                  <button className="btn" onClick={() => runJob('windows_update', { reboot: false })} style={{ justifyContent: 'center', padding: '8px 6px', fontSize: 11 }}>
                    <Icons.Shield/> WinUpdate
                  </button>
                  <button className="btn" onClick={() => runJob('windows_update', { reboot: true })} style={{ justifyContent: 'center', padding: '8px 6px', fontSize: 11 }}>
                    <Icons.Shield/> WinUpdate+Reboot
                  </button>
                </>
              )}
              {isLinux && (
                <>
                  <button className="btn" onClick={() => runJob('linux_update', { reboot: false })} style={{ justifyContent: 'center', padding: '8px 6px', fontSize: 11 }}>
                    <Icons.Download/> Linux Update
                  </button>
                  <button className="btn" onClick={() => runJob('linux_update', { reboot: true })} style={{ justifyContent: 'center', padding: '8px 6px', fontSize: 11 }}>
                    <Icons.Download/> Update+Reboot
                  </button>
                </>
              )}
              {isLinux && info.docker_running != null && (
                <button className="btn" onClick={() => runJob('docker_update')} style={{ justifyContent: 'center', padding: '8px 6px', fontSize: 11 }}>
                  <Icons.Box/> Docker Update
                </button>
              )}
              <button className="btn" onClick={() => runJob('list_crons')} style={{ justifyContent: 'center', padding: '8px 6px', fontSize: 11 }}>
                <Icons.List/> {isWindows ? 'Sched Tasks' : 'Crons/Timers'}
              </button>
              <button className="btn" onClick={() => runJob('disk_cleanup')} style={{ justifyContent: 'center', padding: '8px 6px', fontSize: 11 }}>
                <Icons.Trash/> Disk Cleanup
              </button>
              <button className="btn" onClick={() => runJob('reboot', { delay: 30 })} style={{ justifyContent: 'center', padding: '8px 6px', fontSize: 11 }}>
                <Icons.Power/> Reboot (30s)
              </button>
              {isLinux && (
                <button className="btn" onClick={() => runJob('backup', { script: '/root/proxmox-vm-backup.sh' })} style={{ justifyContent: 'center', padding: '8px 6px', fontSize: 11 }}>
                  <Icons.HardDrive/> Run Backup
                </button>
              )}
              {isWindows && (
                <button className="btn" onClick={() => runJob('disable_autologin')} style={{ justifyContent: 'center', padding: '8px 6px', fontSize: 11 }}>
                  <Icons.Key/> Disable AutoLogin
                </button>
              )}
            </div>
            <div style={{ fontSize: 10, color: 'var(--text-dim)', marginTop: 8 }}>
              Jobs dispatched from here appear in the Jobs tab above.
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

  return (
    <div className="app">

        <div className="sidebar-logo">
          <h1>LabCTL</h1>
          <span>Homelab Management</span>
        </div>
        <div className="nav-section">Management</div>
        {navItems.map(item => {

            <div key={item.id} className={`nav-item ${page === item.id ? 'active' : ''}`}
              onClick={() => setPage(item.id)}>
              <Icon/> {item.label}
            </div>
          );
        })}
        <div className="nav-section">Status</div>
        <div style={{ padding: '4px 20px' }}>
          {hosts.map(h => (
            <div key={h.id} style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '4px 0', fontSize: 12 }}>
              <span className="badge-dot" style={{ color: h.online ? 'var(--green)' : 'var(--red)', width: 6, height: 6, borderRadius: '50%', background: 'currentColor', flexShrink: 0 }}/>
              <span style={{ color: h.online ? 'var(--text-secondary)' : 'var(--text-dim)' }}>{h.hostname}</span>
            </div>
          ))}
        </div>
      </div>

      <div className="main">
        {page === 'hosts' && <HostsPage hosts={hosts} addToast={addToast}/>}
        {page === 'actions' && <ActionsPage hosts={hosts} addToast={addToast}/>}
        {page === 'jobs' && <JobsPage hosts={hosts} addToast={addToast}/>}
        {page === 'schedules' && <SchedulesPage hosts={hosts} addToast={addToast}/>}
        {page === 'credentials' && <CredentialsPage hosts={hosts} addToast={addToast}/>}
      </div>

      <div className="toast-container">
        {toasts.map(t => (
          <div key={t.id} className={`toast toast-${t.type}`}>{t.message}</div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
