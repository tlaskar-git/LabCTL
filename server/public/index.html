<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LabCTL - Homelab Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0e17;
      --bg-secondary: #111827;
      --bg-card: #1a2233;
      --bg-card-hover: #1f2a3e;
      --bg-input: #0d1320;
      --border: #1e2d44;
      --border-focus: #3b82f6;
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-dim: #64748b;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --green: #22c55e;
      --green-bg: rgba(34,197,94,0.12);
      --red: #ef4444;
      --red-bg: rgba(239,68,68,0.12);
      --yellow: #eab308;
      --yellow-bg: rgba(234,179,8,0.12);
      --orange: #f97316;
      --purple: #a855f7;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
      line-height: 1.5;
      min-height: 100vh;
    }

    code, .mono { font-family: 'JetBrains Mono', monospace; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-primary); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Layout */
    .app { display: flex; min-height: 100vh; }
    .sidebar {
      width: 220px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      padding: 20px 0;
      flex-shrink: 0;
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      overflow-y: auto;
      z-index: 100;
    }
    .main {
      flex: 1;
      margin-left: 220px;
      padding: 24px 32px;
      min-width: 0;
    }

    /* Sidebar */
    .sidebar-logo {
      padding: 0 20px 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 12px;
    }
    .sidebar-logo h1 {
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.5px;
    }
    .sidebar-logo span {
      font-size: 11px;
      color: var(--text-dim);
      display: block;
      margin-top: 2px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.15s;
      border-left: 3px solid transparent;
    }
    .nav-item:hover { background: var(--bg-card); color: var(--text-primary); }
    .nav-item.active {
      background: rgba(59,130,246,0.08);
      color: var(--accent);
      border-left-color: var(--accent);
    }
    .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
    .nav-section {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
      padding: 16px 20px 6px;
    }

    /* Cards */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }

    /* Status badges */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
    }
    .badge-online { background: var(--green-bg); color: var(--green); }
    .badge-offline { background: var(--red-bg); color: var(--red); }
    .badge-pending, .badge-sent { background: var(--yellow-bg); color: var(--yellow); }
    .badge-running { background: rgba(59,130,246,0.12); color: var(--accent); }
    .badge-completed { background: var(--green-bg); color: var(--green); }
    .badge-failed { background: var(--red-bg); color: var(--red); }
    .badge-cancelled { background: rgba(100,116,139,0.12); color: var(--text-dim); }
    .badge-waiting { background: rgba(168,85,247,0.12); color: var(--purple); }
    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }
    .badge-dot.pulse { animation: pulse 2s infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-primary);
      transition: all 0.15s;
      font-family: inherit;
    }
    .btn:hover { background: var(--bg-card-hover); border-color: var(--text-dim); }
    .btn-primary { background: var(--accent); border-color: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-danger { background: var(--red); border-color: var(--red); color: white; }
    .btn-danger:hover { opacity: 0.9; }
    .btn-sm { padding: 4px 10px; font-size: 11px; }
    .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }

    /* Form inputs */
    .input, .select, .textarea {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      color: var(--text-primary);
      font-size: 13px;
      font-family: inherit;
      width: 100%;
      transition: border-color 0.15s;
    }
    .input:focus, .select:focus, .textarea:focus {
      outline: none;
      border-color: var(--border-focus);
    }
    .select { appearance: none; cursor: pointer; }
    .textarea { resize: vertical; min-height: 60px; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
    .form-row { display: flex; gap: 12px; margin-bottom: 12px; }
    .form-group { flex: 1; }
    .form-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Tables */
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th {
      text-align: left;
      padding: 8px 12px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      color: var(--text-secondary);
    }
    tr:hover td { background: rgba(59,130,246,0.03); }

    /* Host cards grid */
    .hosts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .host-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
    }
    .host-card:hover {
      border-color: var(--accent);
      background: var(--bg-card-hover);
    }
    .host-card.selected {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent);
    }
    .host-name {
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .host-os {
      font-size: 12px;
      color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
    }
    .host-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }
    .host-stat {
      font-size: 11px;
      color: var(--text-dim);
    }
    .host-stat strong {
      color: var(--text-secondary);
      font-family: 'JetBrains Mono', monospace;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }
    .modal {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 10px;
      width: 100%;
      max-width: 600px;
      max-height: 80vh;
      overflow-y: auto;
      padding: 24px;
    }
    .modal-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    /* Output log */
    .output-log {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      line-height: 1.6;
      max-height: 300px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
      color: var(--text-secondary);
    }

    /* Action tiles */
    .actions-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px;
      margin-bottom: 24px;
    }
    .action-tile {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }
    .action-tile:hover {
      border-color: var(--accent);
      background: var(--bg-card-hover);
      transform: translateY(-1px);
    }
    .action-tile svg { margin-bottom: 8px; color: var(--accent); width: 28px; height: 28px; }
    .action-tile-label { font-size: 12px; font-weight: 600; }
    .action-tile-desc { font-size: 10px; color: var(--text-dim); margin-top: 4px; }

    /* Page header */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .page-title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .page-desc {
      font-size: 13px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    /* Toggle */
    .toggle {
      width: 36px;
      height: 20px;
      border-radius: 10px;
      background: var(--border);
      cursor: pointer;
      position: relative;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .toggle.active { background: var(--accent); }
    .toggle::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: white;
      transition: transform 0.2s;
    }
    .toggle.active::after { transform: translateX(16px); }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
    }
    .tab {
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-dim);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }
    .tab:hover { color: var(--text-secondary); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* Checkbox */
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 13px;
    }
    .checkbox {
      width: 16px;
      height: 16px;
      border: 1px solid var(--border);
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .checkbox.checked {
      background: var(--accent);
      border-color: var(--accent);
    }

    /* Toasts */
    .toast-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 2000;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toast {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      max-width: 360px;
      animation: slideIn 0.3s ease;
    }
    .toast-success { border-left: 3px solid var(--green); }
    .toast-error { border-left: 3px solid var(--red); }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main { margin-left: 0; padding: 16px; }
      .hosts-grid { grid-template-columns: 1fr; }
      .actions-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ── API helper ────────────────────────────────────────────
const API = window.location.origin;

async function api(path, opts = {}) {
  const res = await fetch(`${API}${path}`, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  return res.json();
}

// ── Icons (inline SVGs) ──────────────────────────────────
const Icons = {
  Server: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><circle cx="6" cy="6" r="1"/><circle cx="6" cy="18" r="1"/></svg>,
  Play: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>,
  Clock: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
  Activity: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>,
  Settings: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
  Download: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
  RefreshCw: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>,
  Terminal: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>,
  Shield: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
  HardDrive: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="22" y1="12" x2="2" y2="12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/><circle cx="6" cy="16" r="1"/><circle cx="10" cy="16" r="1"/></svg>,
  Key: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>,
  List: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>,
  X: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
  Power: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg>,
  Box: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>,
  Trash: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
  Pause: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>,
  Stop: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>,
  Eye: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>,
};

// ── Toast system ──────────────────────────────────────────
let toastId = 0;
function useToasts() {
  const [toasts, setToasts] = useState([]);

  const addToast = useCallback((message, type = 'success') => {
    const id = ++toastId;
    setToasts(t => [...t, { id, message, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 4000);
  }, []);

  return { toasts, addToast };
}

// ── Job type metadata ─────────────────────────────────────
const JOB_TYPES = {
  windows_update: { label: 'Windows Update', icon: Icons.Shield, os: 'windows' },
  linux_update: { label: 'Linux Update', icon: Icons.Download, os: 'linux' },
  docker_update: { label: 'Docker Update', icon: Icons.Box, os: 'linux' },
  backup: { label: 'Run Backup', icon: Icons.HardDrive, os: 'linux' },
  reboot: { label: 'Reboot', icon: Icons.Power, os: 'all' },
  autologin: { label: 'Set Auto-Login', icon: Icons.Key, os: 'windows' },
  disable_autologin: { label: 'Disable Auto-Login', icon: Icons.Key, os: 'windows' },
  list_crons: { label: 'List Crons/Tasks', icon: Icons.List, os: 'all' },
  custom_command: { label: 'Custom Command', icon: Icons.Terminal, os: 'all' },
  service_control: { label: 'Service Control', icon: Icons.Settings, os: 'all' },
  disk_cleanup: { label: 'Disk Cleanup', icon: Icons.Trash, os: 'all' },
};

// ══════════════════════════════════════════════════════════
// COMPONENTS
// ══════════════════════════════════════════════════════════

function StatusBadge({ status }) {
  const isOnline = status === 'online';
  return (
    <span className={`badge badge-${status}`}>
      <span className={`badge-dot ${isOnline || status === 'running' ? 'pulse' : ''}`}/>
      {status}
    </span>
  );
}

function Modal({ title, onClose, children }) {
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
          <div className="modal-title">{title}</div>
          <button className="btn btn-sm" onClick={onClose}><Icons.X/></button>
        </div>
        {children}
      </div>
    </div>
  );
}

// ── Hosts Overview ────────────────────────────────────────
function HostsPage({ hosts, onSelectHost, addToast }) {
  const online = hosts.filter(h => h.online || h.status === 'online').length;
  const [groups, setGroups] = useState([]);
  const [showManageGroups, setShowManageGroups] = useState(false);
  const [newGroupName, setNewGroupName] = useState('');
  const [newGroupColor, setNewGroupColor] = useState('#3b82f6');
  const [assigningHost, setAssigningHost] = useState(null);
  const [selectedHost, setSelectedHost] = useState(null);

  const GROUP_COLORS = ['#3b82f6','#22c55e','#f97316','#a855f7','#ef4444','#eab308','#06b6d4','#ec4899'];

  const loadGroups = async () => {
    try { setGroups(await api('/api/groups')); } catch(e) { console.error(e); }
  };

  useEffect(() => { loadGroups(); }, []);

  const addGroup = async () => {
    if (!newGroupName.trim()) return;
    await api('/api/groups', { method: 'POST', body: { name: newGroupName, color: newGroupColor }});
    setNewGroupName('');
    addToast('Group created');
    loadGroups();
  };

  const deleteGroup = async (id) => {
    await api(`/api/groups/${id}`, { method: 'DELETE' });
    addToast('Group deleted');
    loadGroups();
  };

  const assignHost = async (hostId, groupId) => {
    await api(`/api/hosts/${hostId}/group`, { method: 'PUT', body: { group_id: groupId }});
    setAssigningHost(null);
    addToast('Host assigned');
  };

  // Group hosts
  const grouped = {};
  const ungrouped = [];
  hosts.forEach(host => {
    const gid = host.group_id;
    if (gid && groups.find(g => g.id === gid)) {
      if (!grouped[gid]) grouped[gid] = [];
      grouped[gid].push(host);
    } else {
      ungrouped.push(host);
    }
  });

  const renderHostCard = (host) => {
    const info = host.system_info || {};
    const isOnline = host.online || host.status === 'online';
    return (
      <div key={host.id} className="host-card" style={{ position: 'relative' }}
        onClick={() => setSelectedHost(host)}>
        <div style={{ position: 'absolute', top: 8, right: 8 }}>
          <button className="btn btn-sm" style={{ padding: '2px 6px', fontSize: 10 }}
            onClick={(e) => { e.stopPropagation(); setAssigningHost(host); }}
            title="Assign to group">
            <Icons.Settings/>
          </button>
        </div>
        <div className="host-name">
          <StatusBadge status={isOnline ? 'online' : 'offline'}/>
          {host.hostname}
        </div>
        <div className="host-os">{host.os} &middot; {host.ip || info.ip || '\u2014'}</div>
        <div className="host-stats">
          <div className="host-stat">CPU <strong>{info.cpus || '?'} cores</strong></div>
          <div className="host-stat">RAM <strong>{info.ram_mb ? `${Math.round(info.ram_mb/1024)}GB` : '?'}</strong></div>
          <div className="host-stat">Disk <strong>{info.disk_free_gb != null ? `${info.disk_free_gb}GB free` : '?'}</strong></div>
          <div className="host-stat">Up <strong>{info.uptime_hours ? `${info.uptime_hours}h` : '?'}</strong></div>
          {info.docker_running != null && (
            <div className="host-stat">Docker <strong>{info.docker_running} running</strong></div>
          )}
        </div>
      </div>
    );
  };

  return (
    <div>
      <div className="page-header">
        <div>
          <div className="page-title">Hosts</div>
          <div className="page-desc">{hosts.length} registered, {online} online</div>
        </div>
        <button className="btn" onClick={() => setShowManageGroups(true)}>
          <Icons.Settings/> Manage Groups
        </button>
      </div>

      {groups.map(group => {
        const groupHosts = grouped[group.id] || [];
        if (groupHosts.length === 0) return null;
        return (
          <div key={group.id} style={{ marginBottom: 24 }}>
            <div style={{
              display: 'flex', alignItems: 'center', gap: 10, marginBottom: 12,
              paddingBottom: 8, borderBottom: `2px solid ${group.color}`
            }}>
              <span style={{
                width: 12, height: 12, borderRadius: 3, background: group.color, flexShrink: 0
              }}/>
              <span style={{ fontSize: 14, fontWeight: 700, color: 'var(--text-primary)' }}>{group.name}</span>
              <span style={{ fontSize: 12, color: 'var(--text-dim)' }}>{groupHosts.length} host{groupHosts.length !== 1 ? 's' : ''}</span>
            </div>
            <div className="hosts-grid">
              {groupHosts.map(renderHostCard)}
            </div>
          </div>
        );
      })}

      {ungrouped.length > 0 && (
        <div style={{ marginBottom: 24 }}>
          {groups.length > 0 && (
            <div style={{
              display: 'flex', alignItems: 'center', gap: 10, marginBottom: 12,
              paddingBottom: 8, borderBottom: '2px solid var(--border)'
            }}>
              <span style={{ fontSize: 14, fontWeight: 700, color: 'var(--text-dim)' }}>Ungrouped</span>
              <span style={{ fontSize: 12, color: 'var(--text-dim)' }}>{ungrouped.length} host{ungrouped.length !== 1 ? 's' : ''}</span>
            </div>
          )}
          <div className="hosts-grid">
            {ungrouped.map(renderHostCard)}
          </div>
        </div>
      )}

      {hosts.length === 0 && (
        <div className="card" style={{ textAlign: 'center', color: 'var(--text-dim)', padding: 40 }}>
          No hosts registered. Deploy the agent on your machines to get started.
        </div>
      )}

      {/* Manage Groups Modal */}
      {showManageGroups && (
        <Modal title="Manage Groups" onClose={() => setShowManageGroups(false)}>
          <div style={{ marginBottom: 16 }}>
            <div className="form-row">
              <div className="form-group" style={{ flex: 2 }}>
                <label className="form-label">New Group Name</label>
                <input className="input" placeholder="e.g., Proxmox Hosts"
                  value={newGroupName}
                  onChange={e => setNewGroupName(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && addGroup()}/>
              </div>
              <div className="form-group" style={{ flex: 0, minWidth: 80 }}>
                <label className="form-label">Color</label>
                <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap' }}>
                  {GROUP_COLORS.map(c => (
                    <div key={c} onClick={() => setNewGroupColor(c)} style={{
                      width: 24, height: 24, borderRadius: 4, background: c, cursor: 'pointer',
                      border: newGroupColor === c ? '2px solid white' : '2px solid transparent'
                    }}/>
                  ))}
                </div>
              </div>
              <div className="form-group" style={{ flex: 0, alignSelf: 'flex-end' }}>
                <button className="btn btn-primary" onClick={addGroup}>Add</button>
              </div>
            </div>
          </div>

          {groups.length > 0 && (
            <div className="table-wrap">
              <table>
                <thead><tr><th>Color</th><th>Name</th><th>Hosts</th><th>Actions</th></tr></thead>
                <tbody>
                  {groups.map(g => (
                    <tr key={g.id}>
                      <td><span style={{ display: 'inline-block', width: 16, height: 16, borderRadius: 3, background: g.color }}/></td>
                      <td style={{ fontWeight: 600 }}>{g.name}</td>
                      <td>{(grouped[g.id] || []).length}</td>
                      <td>
                        <button className="btn btn-sm btn-danger" onClick={() => deleteGroup(g.id)}>
                          <Icons.Trash/>
                        </button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}

          {groups.length === 0 && (
            <div style={{ textAlign: 'center', color: 'var(--text-dim)', padding: 20, fontSize: 13 }}>
              No groups yet. Create one above.
            </div>
          )}
        </Modal>
      )}

      {/* Assign Host to Group Modal */}
      {assigningHost && (
        <Modal title={`Assign: ${assigningHost.hostname}`} onClose={() => setAssigningHost(null)}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            <div
              onClick={() => assignHost(assigningHost.id, null)}
              style={{
                padding: '10px 14px', borderRadius: 6, cursor: 'pointer',
                background: !assigningHost.group_id ? 'rgba(59,130,246,0.1)' : 'var(--bg-input)',
                border: `1px solid ${!assigningHost.group_id ? 'var(--accent)' : 'var(--border)'}`,
                fontSize: 13
              }}>
              No group (ungrouped)
            </div>
            {groups.map(g => (
              <div key={g.id}
                onClick={() => assignHost(assigningHost.id, g.id)}
                style={{
                  padding: '10px 14px', borderRadius: 6, cursor: 'pointer',
                  display: 'flex', alignItems: 'center', gap: 10,
                  background: assigningHost.group_id === g.id ? 'rgba(59,130,246,0.1)' : 'var(--bg-input)',
                  border: `1px solid ${assigningHost.group_id === g.id ? 'var(--accent)' : 'var(--border)'}`,
                  fontSize: 13
                }}>
                <span style={{ width: 12, height: 12, borderRadius: 3, background: g.color, flexShrink: 0 }}/>
                {g.name}
              </div>
            ))}
          </div>
          {groups.length === 0 && (
            <div style={{ color: 'var(--text-dim)', fontSize: 13, marginTop: 12 }}>
              Create groups first via "Manage Groups" on the Hosts page.
            </div>
          )}
        </Modal>
      )}

      {/* Host Detail Modal */}
      {selectedHost && (
        <HostDetailModal host={selectedHost} onClose={() => setSelectedHost(null)} addToast={addToast}/>
      )}
    </div>
  );
}

// ── Actions Page ──────────────────────────────────────────
function ActionsPage({ hosts, addToast }) {
  const [selectedHosts, setSelectedHosts] = useState([]);
  const [showJobModal, setShowJobModal] = useState(null);
  const [jobParams, setJobParams] = useState({});
  const [groups, setGroups] = useState([]);
  const [trackedJobs, setTrackedJobs] = useState([]);
  const outputRef = useRef(null);

  useEffect(() => { api('/api/groups').then(setGroups).catch(() => {}); }, []);

  // Poll tracked jobs for updates
  useEffect(() => {
    if (trackedJobs.length === 0) return;
    const hasActive = trackedJobs.some(j => ['pending','sent','running'].includes(j.status));
    if (!hasActive) return;
    const i = setInterval(async () => {
      const updated = await Promise.all(
        trackedJobs.map(j => api(`/api/jobs/${j.id}`).catch(() => j))
      );
      setTrackedJobs(updated);
    }, 2000);
    return () => clearInterval(i);
  }, [trackedJobs]);

  const toggleHost = (id) => {
    setSelectedHosts(prev =>
      prev.includes(id) ? prev.filter(h => h !== id) : [...prev, id]
    );
  };

  const selectAll = () => setSelectedHosts(hosts.map(h => h.id));
  const selectNone = () => setSelectedHosts([]);
  const selectGroup = (groupId) => {
    const groupHostIds = hosts.filter(h => h.group_id === groupId).map(h => h.id);
    setSelectedHosts(prev => {
      const allSelected = groupHostIds.every(id => prev.includes(id));
      if (allSelected) return prev.filter(id => !groupHostIds.includes(id));
      return [...new Set([...prev, ...groupHostIds])];
    });
  };

  // Group hosts for display
  const grouped = {};
  const ungrouped = [];
  hosts.forEach(host => {
    const gid = host.group_id;
    if (gid && groups.find(g => g.id === gid)) {
      if (!grouped[gid]) grouped[gid] = [];
      grouped[gid].push(host);
    } else {
      ungrouped.push(host);
    }
  });

  const renderHostChip = (host) => (
    <div key={host.id}
      className="checkbox-row"
      onClick={() => toggleHost(host.id)}
      style={{
        background: selectedHosts.includes(host.id) ? 'rgba(59,130,246,0.1)' : 'var(--bg-input)',
        border: `1px solid ${selectedHosts.includes(host.id) ? 'var(--accent)' : 'var(--border)'}`,
        borderRadius: 6, padding: '6px 10px', fontSize: 12
      }}>
      <div className={`checkbox ${selectedHosts.includes(host.id) ? 'checked' : ''}`}>
        {selectedHosts.includes(host.id) && <span style={{ color: 'white', fontSize: 10 }}>✓</span>}
      </div>
      <span>{host.hostname}</span>
      <StatusBadge status={host.online ? 'online' : 'offline'}/>
    </div>
  );

  const submitJob = async (jobType) => {
    if (selectedHosts.length === 0) {
      addToast('Select at least one host.', 'error');
      return;
    }

    const res = await api('/api/jobs/batch', {
      method: 'POST',
      body: {
        host_ids: selectedHosts,
        type: jobType,
        params: jobParams
      }
    });

    // Track dispatched jobs
    const newJobs = res.map(j => ({ ...j, type: jobType, status: 'pending', result: '', error: '', hostname: hosts.find(h => h.id === j.host_id)?.hostname || j.host_id }));
    setTrackedJobs(prev => [...newJobs, ...prev]);
    addToast(`Dispatched ${jobType} to ${res.length} host(s)`);
    setShowJobModal(null);
    setJobParams({});
    setTimeout(() => { if (outputRef.current) outputRef.current.scrollIntoView({ behavior: 'smooth' }); }, 100);
  };

  const submitChain = async () => {
    const newJobs = [];
    for (const hid of selectedHosts) {
      const res = await api('/api/chains/proxmox-backup-all', {
        method: 'POST',
        body: {
          host_ids: [hid],
          script: jobParams.script || '/root/proxmox-vm-backup.sh',
          reboot_after: jobParams.reboot_after || false
        }
      });
      res.forEach(j => newJobs.push({ ...j, type: 'backup', status: 'pending', result: '', error: '', hostname: hosts.find(h => h.id === j.host_id)?.hostname || j.host_id }));
    }
    setTrackedJobs(prev => [...newJobs, ...prev]);
    addToast(`Backup chain dispatched to ${selectedHosts.length} host(s)`);
    setShowJobModal(null);
    setJobParams({});
    setTimeout(() => { if (outputRef.current) outputRef.current.scrollIntoView({ behavior: 'smooth' }); }, 100);
  };

  return (
    <div>
      <div className="page-header">
        <div>
          <div className="page-title">Actions</div>
          <div className="page-desc">Run tasks across your hosts</div>
        </div>
      </div>

      {/* Host selector */}
      <div className="card">
        <div className="card-header">
          <span className="card-title">Select Hosts ({selectedHosts.length}/{hosts.length})</span>
          <div className="btn-group">
            <button className="btn btn-sm" onClick={selectAll}>All</button>
            <button className="btn btn-sm" onClick={selectNone}>None</button>
          </div>
        </div>

        {groups.map(group => {
          const groupHosts = grouped[group.id] || [];
          if (groupHosts.length === 0) return null;
          const allSelected = groupHosts.every(h => selectedHosts.includes(h.id));
          return (
            <div key={group.id} style={{ marginBottom: 12 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6, cursor: 'pointer' }}
                onClick={() => selectGroup(group.id)}>
                <span style={{ width: 10, height: 10, borderRadius: 2, background: group.color, flexShrink: 0 }}/>
                <span style={{ fontSize: 11, fontWeight: 700, color: 'var(--text-secondary)', textTransform: 'uppercase', letterSpacing: '0.5px' }}>
                  {group.name}
                </span>
                <span style={{ fontSize: 10, color: allSelected ? 'var(--accent)' : 'var(--text-dim)' }}>
                  {allSelected ? '(all selected)' : `(click to ${allSelected ? 'deselect' : 'select'} all)`}
                </span>
              </div>
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, paddingLeft: 18 }}>
                {groupHosts.map(renderHostChip)}
              </div>
            </div>
          );
        })}

        {ungrouped.length > 0 && (
          <div style={{ marginBottom: 8 }}>
            {groups.length > 0 && (
              <div style={{ marginBottom: 6 }}>
                <span style={{ fontSize: 11, fontWeight: 700, color: 'var(--text-dim)', textTransform: 'uppercase', letterSpacing: '0.5px' }}>
                  Ungrouped
                </span>
              </div>
            )}
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, paddingLeft: groups.length > 0 ? 18 : 0 }}>
              {ungrouped.map(renderHostChip)}
            </div>
          </div>
        )}
      </div>

      {/* Action tiles */}
      <div className="actions-grid">
        {Object.entries(JOB_TYPES).map(([key, meta]) => {
          const Icon = meta.icon;
          return (
            <div key={key} className="action-tile" onClick={() => setShowJobModal(key)}>
              <Icon/>
              <div className="action-tile-label">{meta.label}</div>
              <div className="action-tile-desc">{meta.os === 'all' ? 'All OS' : meta.os}</div>
            </div>
          );
        })}
        <div className="action-tile" onClick={() => setShowJobModal('_backup_chain')}>
          <Icons.HardDrive/>
          <div className="action-tile-label">Backup + Reboot Chain</div>
          <div className="action-tile-desc">Proxmox backup, reboot, autologin</div>
        </div>
      </div>

      {/* Job parameter modals */}
      {showJobModal && showJobModal !== '_backup_chain' && (
        <Modal title={`Run: ${JOB_TYPES[showJobModal]?.label}`} onClose={() => setShowJobModal(null)}>
          <div style={{ marginBottom: 16, color: 'var(--text-dim)', fontSize: 13 }}>
            Targets: {selectedHosts.length} host(s) selected
          </div>

          {showJobModal === 'windows_update' && (
            <div className="form-group" style={{ marginBottom: 16 }}>
              <div className="checkbox-row" onClick={() => setJobParams(p => ({ ...p, reboot: !p.reboot }))}>
                <div className={`checkbox ${jobParams.reboot ? 'checked' : ''}`}>
                  {jobParams.reboot && <span style={{ color: 'white', fontSize: 10 }}>✓</span>}
                </div>
                Reboot after update
              </div>
            </div>
          )}

          {showJobModal === 'linux_update' && (
            <div className="form-group" style={{ marginBottom: 16 }}>
              <div className="checkbox-row" onClick={() => setJobParams(p => ({ ...p, reboot: !p.reboot }))}>
                <div className={`checkbox ${jobParams.reboot ? 'checked' : ''}`}>
                  {jobParams.reboot && <span style={{ color: 'white', fontSize: 10 }}>✓</span>}
                </div>
                Reboot if required
              </div>
            </div>
          )}

          {showJobModal === 'docker_update' && (
            <div className="form-row">
              <div className="form-group">
                <label className="form-label">Container (blank = all)</label>
                <input className="input" placeholder="e.g., n8n"
                  value={jobParams.container || ''}
                  onChange={e => setJobParams(p => ({ ...p, container: e.target.value }))}/>
              </div>
              <div className="form-group">
                <label className="form-label">Compose Dir (optional)</label>
                <input className="input" placeholder="/opt/n8n"
                  value={jobParams.compose_dir || ''}
                  onChange={e => setJobParams(p => ({ ...p, compose_dir: e.target.value }))}/>
              </div>
            </div>
          )}

          {showJobModal === 'backup' && (
            <div className="form-group" style={{ marginBottom: 16 }}>
              <label className="form-label">Backup Script Path</label>
              <input className="input" placeholder="/root/proxmox-vm-backup.sh"
                value={jobParams.script || ''}
                onChange={e => setJobParams(p => ({ ...p, script: e.target.value }))}/>
            </div>
          )}

          {showJobModal === 'autologin' && (
            <>
              <div className="form-row">
                <div className="form-group">
                  <label className="form-label">Username</label>
                  <input className="input" placeholder="Administrator"
                    value={jobParams.username || ''}
                    onChange={e => setJobParams(p => ({ ...p, username: e.target.value }))}/>
                </div>
                <div className="form-group">
                  <label className="form-label">Password</label>
                  <input className="input" type="password"
                    value={jobParams.password || ''}
                    onChange={e => setJobParams(p => ({ ...p, password: e.target.value }))}/>
                </div>
              </div>
              <div className="form-group" style={{ marginBottom: 16 }}>
                <label className="form-label">Domain (optional)</label>
                <input className="input" placeholder="slobal.local"
                  value={jobParams.domain || ''}
                  onChange={e => setJobParams(p => ({ ...p, domain: e.target.value }))}/>
              </div>
            </>
          )}

          {showJobModal === 'custom_command' && (
            <div className="form-group" style={{ marginBottom: 16 }}>
              <label className="form-label">Command</label>
              <textarea className="textarea" rows={3}
                placeholder="e.g., systemctl status nginx"
                value={jobParams.command || ''}
                onChange={e => setJobParams(p => ({ ...p, command: e.target.value }))}/>
            </div>
          )}

          {showJobModal === 'service_control' && (
            <div className="form-row">
              <div className="form-group">
                <label className="form-label">Service Name</label>
                <input className="input" placeholder="nginx"
                  value={jobParams.service || ''}
                  onChange={e => setJobParams(p => ({ ...p, service: e.target.value }))}/>
              </div>
              <div className="form-group">
                <label className="form-label">Action</label>
                <select className="select input"
                  value={jobParams.action || 'status'}
                  onChange={e => setJobParams(p => ({ ...p, action: e.target.value }))}>
                  <option value="status">Status</option>
                  <option value="start">Start</option>
                  <option value="stop">Stop</option>
                  <option value="restart">Restart</option>
                </select>
              </div>
            </div>
          )}

          {showJobModal === 'reboot' && (
            <div className="form-group" style={{ marginBottom: 16 }}>
              <label className="form-label">Delay (seconds)</label>
              <input className="input" type="number" placeholder="30"
                value={jobParams.delay || 30}
                onChange={e => setJobParams(p => ({ ...p, delay: parseInt(e.target.value) || 30 }))}/>
            </div>
          )}

          <div className="btn-group" style={{ justifyContent: 'flex-end' }}>
            <button className="btn" onClick={() => setShowJobModal(null)}>Cancel</button>
            <button className="btn btn-primary" onClick={() => submitJob(showJobModal)}>
              <Icons.Play/> Execute
            </button>
          </div>
        </Modal>
      )}

      {showJobModal === '_backup_chain' && (
        <Modal title="Backup + Reboot + Autologin Chain" onClose={() => setShowJobModal(null)}>
          <div style={{ marginBottom: 16, color: 'var(--text-dim)', fontSize: 13 }}>
            Runs backup script, then reboots, then configures autologin on Windows hosts.
          </div>
          <div className="form-group" style={{ marginBottom: 12 }}>
            <label className="form-label">Backup Script Path</label>
            <input className="input" placeholder="/root/proxmox-vm-backup.sh"
              value={jobParams.script || ''}
              onChange={e => setJobParams(p => ({ ...p, script: e.target.value }))}/>
          </div>
          <div className="checkbox-row" onClick={() => setJobParams(p => ({ ...p, reboot_after: !p.reboot_after }))}
            style={{ marginBottom: 16 }}>
            <div className={`checkbox ${jobParams.reboot_after ? 'checked' : ''}`}>
              {jobParams.reboot_after && <span style={{ color: 'white', fontSize: 10 }}>✓</span>}
            </div>
            Reboot hosts after backup
          </div>
          <div className="btn-group" style={{ justifyContent: 'flex-end' }}>
            <button className="btn" onClick={() => setShowJobModal(null)}>Cancel</button>
            <button className="btn btn-primary" onClick={submitChain}><Icons.Play/> Run Chain</button>
          </div>
        </Modal>
      )}

      {/* Live Output Panel */}
      {trackedJobs.length > 0 && (
        <div ref={outputRef} className="card" style={{ marginTop: 8 }}>
          <div className="card-header">
            <span className="card-title">Job Output ({trackedJobs.filter(j => ['pending','sent','running'].includes(j.status)).length} active)</span>
            <div className="btn-group">
              <button className="btn btn-sm" onClick={() => setTrackedJobs([])}>Clear All</button>
            </div>
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {trackedJobs.map(job => (
              <div key={job.id} style={{
                background: 'var(--bg-primary)', border: '1px solid var(--border)',
                borderRadius: 6, padding: 12,
                borderLeftColor: job.status === 'completed' ? 'var(--green)' : job.status === 'failed' ? 'var(--red)' : job.status === 'running' ? 'var(--accent)' : 'var(--yellow)',
                borderLeftWidth: 3
              }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
                  <StatusBadge status={job.status}/>
                  <span style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 12, color: 'var(--text-primary)' }}>
                    {job.type}
                  </span>
                  <span style={{ fontSize: 11, color: 'var(--text-dim)' }}>
                    {job.hostname}
                  </span>
                  {['pending','sent'].includes(job.status) && (
                    <button className="btn btn-sm" style={{ marginLeft: 'auto', padding: '2px 8px' }}
                      onClick={async () => {
                        await api(`/api/jobs/${job.id}/cancel`, { method: 'POST' });
                        setTrackedJobs(prev => prev.map(j => j.id === job.id ? { ...j, status: 'cancelled' } : j));
                      }}>Cancel</button>
                  )}
                </div>
                {(job.result || job.error) && (
                  <div className="output-log" style={{
                    maxHeight: 200, fontSize: 11,
                    borderColor: job.error ? 'var(--red)' : 'var(--border)'
                  }}>
                    {job.result || job.error}
                  </div>
                )}
                {['pending','sent','running'].includes(job.status) && !job.result && (
                  <div style={{ fontSize: 11, color: 'var(--text-dim)', fontStyle: 'italic' }}>
                    {job.status === 'running' ? 'Running, waiting for output...' : 'Queued, waiting for agent...'}
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ── Jobs Page ─────────────────────────────────────────────
function JobsPage({ hosts, addToast }) {
  const [jobs, setJobs] = useState([]);
  const [filter, setFilter] = useState('all');
  const [viewJob, setViewJob] = useState(null);

  const loadJobs = async () => {
    const data = await api('/api/jobs?limit=200');
    setJobs(data);
  };

  useEffect(() => { loadJobs(); const i = setInterval(loadJobs, 5000); return () => clearInterval(i); }, []);

  const cancelJob = async (id) => {
    await api(`/api/jobs/${id}/cancel`, { method: 'POST' });
    addToast('Job cancelled');
    loadJobs();
  };

  const filtered = filter === 'all' ? jobs : jobs.filter(j => j.status === filter);

  return (
    <div>
      <div className="page-header">
        <div>
          <div className="page-title">Jobs</div>
          <div className="page-desc">{jobs.length} total jobs</div>
        </div>
        <button className="btn" onClick={loadJobs}><Icons.RefreshCw/> Refresh</button>
      </div>

      <div className="tabs">
        {['all', 'running', 'pending', 'sent', 'completed', 'failed'].map(f => (
          <div key={f} className={`tab ${filter === f ? 'active' : ''}`} onClick={() => setFilter(f)}>
            {f} ({f === 'all' ? jobs.length : jobs.filter(j => j.status === f).length})
          </div>
        ))}
      </div>

      <div className="table-wrap">
        <table>
          <thead><tr>
            <th>Status</th><th>Type</th><th>Host</th><th>Created</th><th>Actions</th>
          </tr></thead>
          <tbody>
            {filtered.map(job => (
              <tr key={job.id}>
                <td><StatusBadge status={job.status}/></td>
                <td style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 12 }}>{job.type}</td>
                <td>{job.hostname || job.host_id?.slice(0, 8)}</td>
                <td style={{ fontSize: 12, color: 'var(--text-dim)' }}>{job.created_at}</td>
                <td>
                  <div className="btn-group">
                    <button className="btn btn-sm" onClick={() => setViewJob(job)}>
                      <Icons.Eye/> View
                    </button>
                    {['pending', 'sent'].includes(job.status) && (
                      <button className="btn btn-sm btn-danger" onClick={() => cancelJob(job.id)}>
                        <Icons.Stop/> Cancel
                      </button>
                    )}
                  </div>
                </td>
              </tr>
            ))}
            {filtered.length === 0 && (
              <tr><td colSpan={5} style={{ textAlign: 'center', padding: 30, color: 'var(--text-dim)' }}>
                No jobs found.
              </td></tr>
            )}
          </tbody>
        </table>
      </div>

      {viewJob && (
        <Modal title={`Job: ${viewJob.type}`} onClose={() => setViewJob(null)}>
          <div style={{ marginBottom: 12 }}>
            <StatusBadge status={viewJob.status}/>
            <span style={{ marginLeft: 8, color: 'var(--text-dim)', fontSize: 12 }}>
              {viewJob.hostname} &middot; {viewJob.created_at}
            </span>
          </div>
          {viewJob.params && viewJob.params !== '{}' && (
            <div style={{ marginBottom: 12 }}>
              <div className="form-label">Parameters</div>
              <div className="output-log">{JSON.stringify(JSON.parse(viewJob.params || '{}'), null, 2)}</div>
            </div>
          )}
          {viewJob.result && (
            <div style={{ marginBottom: 12 }}>
              <div className="form-label">Output</div>
              <div className="output-log">{viewJob.result}</div>
            </div>
          )}
          {viewJob.error && (
            <div>
              <div className="form-label" style={{ color: 'var(--red)' }}>Error</div>
              <div className="output-log" style={{ borderColor: 'var(--red)' }}>{viewJob.error}</div>
            </div>
          )}
        </Modal>
      )}
    </div>
  );
}

// ── Schedules Page ────────────────────────────────────────
function SchedulesPage({ hosts, addToast }) {
  const [schedules, setSchedules] = useState([]);
  const [showAdd, setShowAdd] = useState(false);
  const [form, setForm] = useState({ name: '', host_id: '', type: 'backup', cron: '0 1 * * 0', params: {} });

  const load = async () => { setSchedules(await api('/api/schedules')); };
  useEffect(() => { load(); }, []);

  const addSchedule = async () => {
    if (!form.name || !form.host_id || !form.cron) {
      addToast('Fill in all required fields.', 'error');
      return;
    }
    await api('/api/schedules', { method: 'POST', body: form });
    addToast(`Schedule "${form.name}" created`);
    setShowAdd(false);
    setForm({ name: '', host_id: '', type: 'backup', cron: '0 1 * * 0', params: {} });
    load();
  };

  const toggleSchedule = async (id, enabled) => {
    await api(`/api/schedules/${id}`, { method: 'PUT', body: { enabled: !enabled } });
    load();
  };

  const deleteSchedule = async (id) => {
    await api(`/api/schedules/${id}`, { method: 'DELETE' });
    addToast('Schedule deleted');
    load();
  };

  return (
    <div>
      <div className="page-header">
        <div>
          <div className="page-title">Schedules</div>
          <div className="page-desc">Cron-based job scheduling</div>
        </div>
        <button className="btn btn-primary" onClick={() => setShowAdd(true)}>+ New Schedule</button>
      </div>

      <div className="table-wrap">
        <table>
          <thead><tr>
            <th>Enabled</th><th>Name</th><th>Type</th><th>Host</th><th>Cron</th><th>Next Run</th><th>Actions</th>
          </tr></thead>
          <tbody>
            {schedules.map(s => (
              <tr key={s.id}>
                <td>
                  <div className={`toggle ${s.enabled ? 'active' : ''}`}
                    onClick={() => toggleSchedule(s.id, s.enabled)}/>
                </td>
                <td style={{ fontWeight: 600 }}>{s.name}</td>
                <td><span className="mono" style={{ fontSize: 12 }}>{s.type}</span></td>
                <td>{s.hostname || s.host_id?.slice(0, 8)}</td>
                <td><code style={{ fontSize: 12, color: 'var(--accent)' }}>{s.cron}</code></td>
                <td style={{ fontSize: 12, color: 'var(--text-dim)' }}>{s.next_run?.slice(0, 19)}</td>
                <td>
                  <button className="btn btn-sm btn-danger" onClick={() => deleteSchedule(s.id)}>
                    <Icons.Trash/>
                  </button>
                </td>
              </tr>
            ))}
            {schedules.length === 0 && (
              <tr><td colSpan={7} style={{ textAlign: 'center', padding: 30, color: 'var(--text-dim)' }}>
                No schedules. Create one to automate jobs.
              </td></tr>
            )}
          </tbody>
        </table>
      </div>

      {showAdd && (
        <Modal title="New Schedule" onClose={() => setShowAdd(false)}>
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">Schedule Name</label>
              <input className="input" placeholder="Weekly LAB01 Backup"
                value={form.name} onChange={e => setForm(f => ({ ...f, name: e.target.value }))}/>
            </div>
          </div>
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">Host</label>
              <select className="select input" value={form.host_id}
                onChange={e => setForm(f => ({ ...f, host_id: e.target.value }))}>
                <option value="">Select host...</option>
                {hosts.map(h => <option key={h.id} value={h.id}>{h.hostname}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">Job Type</label>
              <select className="select input" value={form.type}
                onChange={e => setForm(f => ({ ...f, type: e.target.value }))}>
                {Object.entries(JOB_TYPES).map(([k, v]) => (
                  <option key={k} value={k}>{v.label}</option>
                ))}
              </select>
            </div>
          </div>
          <div className="form-group" style={{ marginBottom: 12 }}>
            <label className="form-label">Cron Expression</label>
            <input className="input mono" placeholder="0 1 * * 0"
              value={form.cron} onChange={e => setForm(f => ({ ...f, cron: e.target.value }))}/>
            <div style={{ fontSize: 11, color: 'var(--text-dim)', marginTop: 4 }}>
              min hour day month weekday &middot; Examples: <code>0 1 * * 0</code> (Sun 1AM), <code>0 3 * * *</code> (daily 3AM)
            </div>
          </div>

          {form.type === 'backup' && (
            <div className="form-group" style={{ marginBottom: 12 }}>
              <label className="form-label">Script Path</label>
              <input className="input" placeholder="/root/proxmox-vm-backup.sh"
                value={form.params.script || ''}
                onChange={e => setForm(f => ({ ...f, params: { ...f.params, script: e.target.value } }))}/>
            </div>
          )}

          {form.type === 'custom_command' && (
            <div className="form-group" style={{ marginBottom: 12 }}>
              <label className="form-label">Command</label>
              <textarea className="textarea"
                value={form.params.command || ''}
                onChange={e => setForm(f => ({ ...f, params: { ...f.params, command: e.target.value } }))}/>
            </div>
          )}

          <div className="btn-group" style={{ justifyContent: 'flex-end' }}>
            <button className="btn" onClick={() => setShowAdd(false)}>Cancel</button>
            <button className="btn btn-primary" onClick={addSchedule}>Create Schedule</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── Host Detail Modal ─────────────────────────────────────
function HostDetailModal({ host, onClose, addToast }) {
  const [jobs, setJobs] = useState([]);
  const [activeTab, setActiveTab] = useState('overview');
  const [viewJob, setViewJob] = useState(null);

  const info = host.system_info || {};
  const isOnline = host.online || host.status === 'online';
  const isWindows = (host.os || '').toLowerCase().includes('windows');
  const isLinux = !isWindows;

  useEffect(() => {
    api(`/api/jobs?host_id=${host.id}&limit=50`).then(setJobs).catch(() => {});
    const i = setInterval(() => {
      api(`/api/jobs?host_id=${host.id}&limit=50`).then(setJobs).catch(() => {});
    }, 5000);
    return () => clearInterval(i);
  }, [host.id]);

  const runJob = async (type, params = {}) => {
    await api('/api/jobs', { method: 'POST', body: { host_id: host.id, type, params }});
    addToast(`${type} dispatched to ${host.hostname}`);
  };

  const lastJobOfType = (type) => jobs.find(j => j.type === type && j.status === 'completed');
  const ramPercent = info.ram_mb && info.ram_available_mb ? Math.round(((info.ram_mb - info.ram_available_mb) / info.ram_mb) * 100) : null;
  const diskPercent = info.disk_total_gb && info.disk_free_gb ? Math.round(((info.disk_total_gb - info.disk_free_gb) / info.disk_total_gb) * 100) : null;

  const ProgressBar = ({ percent, color }) => (
    <div style={{ background: 'var(--bg-primary)', borderRadius: 4, height: 6, width: '100%', overflow: 'hidden' }}>
      <div style={{ width: `${percent}%`, height: '100%', borderRadius: 4, background: percent > 85 ? 'var(--red)' : percent > 65 ? 'var(--yellow)' : color || 'var(--accent)', transition: 'width 0.3s' }}/>
    </div>
  );

  const InfoRow = ({ label, value, mono }) => (
    <div style={{ display: 'flex', justifyContent: 'space-between', padding: '6px 0', borderBottom: '1px solid var(--border)' }}>
      <span style={{ fontSize: 12, color: 'var(--text-dim)' }}>{label}</span>
      <span style={{ fontSize: 12, color: 'var(--text-primary)', fontFamily: mono ? 'JetBrains Mono, monospace' : 'inherit' }}>{value || '\u2014'}</span>
    </div>
  );

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()} style={{ maxWidth: 700, maxHeight: '90vh' }}>
        {/* Header */}
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 16 }}>
          <div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 4 }}>
              <span style={{ fontSize: 18, fontWeight: 700 }}>{host.hostname}</span>
              <StatusBadge status={isOnline ? 'online' : 'offline'}/>
            </div>
            <div style={{ fontSize: 12, color: 'var(--text-dim)', fontFamily: 'JetBrains Mono, monospace' }}>
              {host.os} &middot; {host.ip || info.ip} &middot; {info.platform || ''}
            </div>
          </div>
          <button className="btn btn-sm" onClick={onClose}><Icons.X/></button>
        </div>

        {/* Tabs */}
        <div className="tabs">
          {['overview','jobs','quick actions'].map(t => (
            <div key={t} className={`tab ${activeTab === t ? 'active' : ''}`} onClick={() => setActiveTab(t)}>
              {t.charAt(0).toUpperCase() + t.slice(1)}
            </div>
          ))}
        </div>

        {/* Overview Tab */}
        {activeTab === 'overview' && (
          <div>
            {/* Resource bars */}
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 16 }}>
              <div className="card" style={{ padding: 12, marginBottom: 0 }}>
                <div style={{ fontSize: 11, color: 'var(--text-dim)', marginBottom: 6 }}>RAM Usage</div>
                {ramPercent !== null ? (
                  <>
                    <ProgressBar percent={ramPercent}/>
                    <div style={{ fontSize: 11, color: 'var(--text-secondary)', marginTop: 4 }}>
                      {Math.round((info.ram_mb - info.ram_available_mb) / 1024 * 10) / 10}GB / {Math.round(info.ram_mb / 1024 * 10) / 10}GB ({ramPercent}%)
                    </div>
                  </>
                ) : <span style={{ fontSize: 12, color: 'var(--text-dim)' }}>N/A</span>}
              </div>
              <div className="card" style={{ padding: 12, marginBottom: 0 }}>
                <div style={{ fontSize: 11, color: 'var(--text-dim)', marginBottom: 6 }}>Disk Usage</div>
                {diskPercent !== null ? (
                  <>
                    <ProgressBar percent={diskPercent}/>
                    <div style={{ fontSize: 11, color: 'var(--text-secondary)', marginTop: 4 }}>
                      {Math.round((info.disk_total_gb - info.disk_free_gb) * 10) / 10}GB / {info.disk_total_gb}GB ({diskPercent}%)
                    </div>
                  </>
                ) : <span style={{ fontSize: 12, color: 'var(--text-dim)' }}>N/A</span>}
              </div>
            </div>

            {/* System Info */}
            <div className="card" style={{ padding: 12 }}>
              <div style={{ fontSize: 12, fontWeight: 700, marginBottom: 8, color: 'var(--text-secondary)' }}>System Info</div>
              <InfoRow label="Hostname" value={info.hostname || host.hostname} mono/>
              <InfoRow label="OS" value={host.os}/>
              <InfoRow label="Platform" value={info.platform}/>
              <InfoRow label="Architecture" value={info.arch}/>
              <InfoRow label="CPU Cores" value={info.cpus} mono/>
              <InfoRow label="IP Address" value={host.ip || info.ip} mono/>
              <InfoRow label="Uptime" value={info.uptime_hours ? `${info.uptime_hours} hours (${Math.round(info.uptime_hours / 24)} days)` : null}/>
              <InfoRow label="Last Seen" value={host.last_seen ? new Date(host.last_seen).toLocaleString() : null}/>
              <InfoRow label="Agent ID" value={host.id} mono/>

            {/* Docker containers */}
            {info.docker_containers && info.docker_containers.length > 0 && (
              <div className="card" style={{ padding: 12 }}>
                <div style={{ fontSize: 12, fontWeight: 700, marginBottom: 8, color: 'var(--text-secondary)' }}>
                  Docker Containers ({info.docker_running} running)

                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
                  {info.docker_containers.map(c => (
                    <span key={c} style={{
                      background: 'var(--bg-primary)', border: '1px solid var(--border)',
                      borderRadius: 4, padding: '3px 8px', fontSize: 11,
                      fontFamily: 'JetBrains Mono, monospace', color: 'var(--green)'
                    }}>{c}</span>
                  ))}
                </div>
              </div>
            )}

            {/* Last job results */}
            {(() => {
              const cronJob = lastJobOfType('list_crons');
              if (!cronJob) return null;
              return (
                <div className="card" style={{ padding: 12 }}>
                  <div style={{ fontSize: 12, fontWeight: 700, marginBottom: 8, color: 'var(--text-secondary)' }}>
                    {isWindows ? 'Scheduled Tasks' : 'Cron Jobs / Timers'}
                  </div>
                  <div className="output-log" style={{ maxHeight: 200 }}>{cronJob.result}</div>
                </div>
              );
            })()}
          </div>
        )}

        {/* Jobs Tab */}
        {activeTab === 'jobs' && (
          <div>
            <div className="table-wrap">
              <table>
                <thead><tr><th>Status</th><th>Type</th><th>Created</th><th>Actions</th></tr></thead>
                <tbody>
                  {jobs.slice(0, 30).map(job => (
                    <tr key={job.id}>
                      <td><StatusBadge status={job.status}/></td>
                      <td style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 11 }}>{job.type}</td>
                      <td style={{ fontSize: 11, color: 'var(--text-dim)' }}>{job.created_at?.slice(0, 19)}</td>
                      <td>
                        <button className="btn btn-sm" onClick={() => setViewJob(job)}><Icons.Eye/></button>
                      </td>
                    </tr>
                  ))}
                  {jobs.length === 0 && (
                    <tr><td colSpan={4} style={{ textAlign: 'center', padding: 20, color: 'var(--text-dim)' }}>No jobs for this host.</td></tr>
                  )}
                </tbody>
              </table>
            </div>

            {viewJob && (
              <div style={{ marginTop: 12 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8 }}>
                  <StatusBadge status={viewJob.status}/>
                  <span className="mono" style={{ fontSize: 12 }}>{viewJob.type}</span>
                  <span style={{ fontSize: 11, color: 'var(--text-dim)' }}>{viewJob.created_at}</span>
                  <button className="btn btn-sm" style={{ marginLeft: 'auto' }} onClick={() => setViewJob(null)}><Icons.X/></button>
                </div>
                {viewJob.result && <div className="output-log">{viewJob.result}</div>}
                {viewJob.error && <div className="output-log" style={{ borderColor: 'var(--red)' }}>{viewJob.error}</div>}
              </div>
            )}
          </div>
        )}

        {/* Quick Actions Tab */}
        {activeTab === 'quick actions' && (
          <div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
              {isWindows && (
                <>
                  <button className="btn" onClick={() => runJob('windows_update', { reboot: false })} style={{ justifyContent: 'center', padding: 12 }}>
                    <Icons.Shield/> Windows Update (no reboot)
                  </button>
                  <button className="btn" onClick={() => runJob('windows_update', { reboot: true })} style={{ justifyContent: 'center', padding: 12 }}>
                    <Icons.Shield/> Windows Update + Reboot
                  </button>
                </>
              )}
              {isLinux && (
                <>
                  <button className="btn" onClick={() => runJob('linux_update', { reboot: false })} style={{ justifyContent: 'center', padding: 12 }}>
                    <Icons.Download/> Linux Update
                  </button>
                  <button className="btn" onClick={() => runJob('linux_update', { reboot: true })} style={{ justifyContent: 'center', padding: 12 }}>
                    <Icons.Download/> Linux Update + Reboot
                  </button>
                </>
              )}
              {isLinux && info.docker_running != null && (
                <button className="btn" onClick={() => runJob('docker_update')} style={{ justifyContent: 'center', padding: 12 }}>
                  <Icons.Box/> Update Docker Containers
                </button>
              )}
              <button className="btn" onClick={() => runJob('list_crons')} style={{ justifyContent: 'center', padding: 12 }}>
                <Icons.List/> {isWindows ? 'List Scheduled Tasks' : 'List Crons/Timers'}
              </button>
              <button className="btn" onClick={() => runJob('disk_cleanup')} style={{ justifyContent: 'center', padding: 12 }}>
                <Icons.Trash/> Disk Cleanup
              </button>
              <button className="btn" onClick={() => runJob('reboot', { delay: 30 })} style={{ justifyContent: 'center', padding: 12 }}>
                <Icons.Power/> Reboot (30s delay)
              </button>
              {isLinux && (
                <button className="btn" onClick={() => runJob('backup', { script: '/root/proxmox-vm-backup.sh' })} style={{ justifyContent: 'center', padding: 12 }}>
                  <Icons.HardDrive/> Run Backup Script
                </button>
              )}
              {isWindows && (
                <button className="btn" onClick={() => runJob('disable_autologin')} style={{ justifyContent: 'center', padding: 12 }}>
                  <Icons.Key/> Disable Auto-Login
                </button>
              )}
            </div>
            <div style={{ fontSize: 11, color: 'var(--text-dim)', marginTop: 12 }}>
              Jobs dispatched from here appear in the Jobs tab above. Click a job to view output.
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────
function App() {
  const [page, setPage] = useState('hosts');
  const [hosts, setHosts] = useState([]);
  const { toasts, addToast } = useToasts();

  const loadHosts = async () => {
    try { setHosts(await api('/api/hosts')); } catch (e) { console.error(e); }
  };

  useEffect(() => {
    loadHosts();
    const i = setInterval(loadHosts, 5000);
    return () => clearInterval(i);
  }, []);

  const navItems = [
    { id: 'hosts', label: 'Hosts', icon: Icons.Server },
    { id: 'actions', label: 'Actions', icon: Icons.Play },
    { id: 'jobs', label: 'Jobs', icon: Icons.Activity },
    { id: 'schedules', label: 'Schedules', icon: Icons.Clock },
    { id: 'credentials', label: 'Credentials', icon: Icons.Key },
  ];

  return (
    <div className="app">
      <div className="sidebar">
        <div className="sidebar-logo">
          <h1>LabCTL</h1>
          <span>slobal.local homelab</span>
        </div>
        <div className="nav-section">Management</div>
        {navItems.map(item => {
          const Icon = item.icon;
          return (
            <div key={item.id} className={`nav-item ${page === item.id ? 'active' : ''}`}
              onClick={() => setPage(item.id)}>
              <Icon/> {item.label}
            </div>
          );
        })}
        <div className="nav-section">Status</div>
        <div style={{ padding: '4px 20px' }}>
          {hosts.map(h => (
            <div key={h.id} style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '4px 0', fontSize: 12 }}>
              <span className="badge-dot" style={{ color: h.online ? 'var(--green)' : 'var(--red)', width: 6, height: 6, borderRadius: '50%', background: 'currentColor', flexShrink: 0 }}/>
              <span style={{ color: h.online ? 'var(--text-secondary)' : 'var(--text-dim)' }}>{h.hostname}</span>
            </div>
          ))}
        </div>
      </div>

      <div className="main">
        {page === 'hosts' && <HostsPage hosts={hosts} addToast={addToast}/>}
        {page === 'actions' && <ActionsPage hosts={hosts} addToast={addToast}/>}
        {page === 'jobs' && <JobsPage hosts={hosts} addToast={addToast}/>}
        {page === 'schedules' && <SchedulesPage hosts={hosts} addToast={addToast}/>}
        {page === 'credentials' && <CredentialsPage hosts={hosts} addToast={addToast}/>}
      </div>

      <div className="toast-container">
        {toasts.map(t => (
          <div key={t.id} className={`toast toast-${t.type}`}>{t.message}</div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
