function StatusBadge({ status }) {
  const isOnline = status === 'online';
  return (
    <span className={`badge badge-${status}`}>
      <span className={`badge-dot ${isOnline || status === 'running' ? 'pulse' : ''}`}/>
      {status}
    </span>
  );
}

function Modal({ title, onClose, children }) {
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
          <div className="modal-title">{title}</div>
          <button className="btn-close" onClick={onClose}><Icons.X/></button>
        </div>
        {children}
      </div>
    </div>
  );
}

// ── Hosts Overview ────────────────────────────────────────
function HostsPage({ hosts, onSelectHost, addToast }) {
  const online = hosts.filter(h => h.online || h.status === 'online').length;
  const [groups, setGroups] = useState([]);
  const [showManageGroups, setShowManageGroups] = useState(false);
  const [newGroupName, setNewGroupName] = useState('');
  const [newGroupColor, setNewGroupColor] = useState('#3b82f6');
  const [assigningHost, setAssigningHost] = useState(null);
  const [selectedHost, setSelectedHost] = useState(null);

  const GROUP_COLORS = ['#3b82f6','#22c55e','#f97316','#a855f7','#ef4444','#eab308','#06b6d4','#ec4899'];

  const loadGroups = async () => {
    try { setGroups(await api('/api/groups')); } catch(e) { console.error(e); }
  };

  useEffect(() => { loadGroups(); }, []);

  const addGroup = async () => {
    if (!newGroupName.trim()) return;
    await api('/api/groups', { method: 'POST', body: { name: newGroupName, color: newGroupColor }});
    setNewGroupName('');
    addToast('Group created');
    loadGroups();
  };

  const deleteGroup = async (id) => {
    await api(`/api/groups/${id}`, { method: 'DELETE' });
    addToast('Group deleted');
    loadGroups();
  };

  const assignHost = async (hostId, groupId) => {
    await api(`/api/hosts/${hostId}/group`, { method: 'PUT', body: { group_id: groupId }});
    setAssigningHost(null);
    addToast('Host assigned');
  };

  // Group hosts
  const grouped = {};
  const ungrouped = [];
  hosts.forEach(host => {
    const gid = host.group_id;
    if (gid && groups.find(g => g.id === gid)) {
      if (!grouped[gid]) grouped[gid] = [];
      grouped[gid].push(host);
    } else {
      ungrouped.push(host);
    }
  });

  const renderHostCard = (host) => {
    const info = host.system_info || {};
    const isOnline = host.online || host.status === 'online';
    return (
      <div key={host.id} className="host-card" style={{ position: 'relative' }}
        onClick={() => setSelectedHost(host)}>
        <div style={{ position: 'absolute', top: 8, right: 8 }}>
          <button className="btn btn-sm" style={{ padding: '2px 6px', fontSize: 10 }}
            onClick={(e) => { e.stopPropagation(); setAssigningHost(host); }}
            title="Assign to group">
            <Icons.Settings/>
          </button>
        </div>
        <div className="host-name">
          <StatusBadge status={isOnline ? 'online' : 'offline'}/>
          {host.hostname}
        </div>
        <div className="host-os">{host.os} &middot; {host.ip || info.ip || '\u2014'}</div>
        <div className="host-stats">
          <div className="host-stat">CPU <strong>{info.cpus || '?'} cores</strong></div>
          <div className="host-stat">RAM <strong>{info.ram_mb ? `${Math.round(info.ram_mb/1024)}GB` : '?'}</strong></div>
          <div className="host-stat">Disk <strong>{info.disk_free_gb != null ? `${info.disk_free_gb}GB free` : '?'}</strong></div>
          <div className="host-stat">Up <strong>{info.uptime_hours ? `${info.uptime_hours}h` : '?'}</strong></div>
          {info.docker_running != null && (
            <div className="host-stat">Docker <strong>{info.docker_running} running</strong></div>
          )}
        </div>
      </div>
    );
  };

  return (
    <div>
      <div className="page-header">
        <div>
          <div className="page-title">Hosts</div>
          <div className="page-desc">{hosts.length} registered, {online} online</div>
        </div>
        <button className="btn" onClick={() => setShowManageGroups(true)}>
          <Icons.Settings/> Manage Groups
        </button>
      </div>

      {groups.map(group => {
        const groupHosts = grouped[group.id] || [];
        if (groupHosts.length === 0) return null;
        return (
          <div key={group.id} style={{ marginBottom: 24 }}>
            <div style={{
              display: 'flex', alignItems: 'center', gap: 10, marginBottom: 12,
              paddingBottom: 8, borderBottom: `2px solid ${group.color}`
            }}>
              <span style={{
                width: 12, height: 12, borderRadius: 3, background: group.color, flexShrink: 0
              }}/>
              <span style={{ fontSize: 14, fontWeight: 700, color: 'var(--text-primary)' }}>{group.name}</span>
              <span style={{ fontSize: 12, color: 'var(--text-dim)' }}>{groupHosts.length} host{groupHosts.length !== 1 ? 's' : ''}</span>
            </div>
            <div className="hosts-grid">
              {groupHosts.map(renderHostCard)}
            </div>
          </div>
        );
      })}

      {ungrouped.length > 0 && (
        <div style={{ marginBottom: 24 }}>
          {groups.length > 0 && (
            <div style={{
              display: 'flex', alignItems: 'center', gap: 10, marginBottom: 12,
              paddingBottom: 8, borderBottom: '2px solid var(--border)'
            }}>
              <span style={{ fontSize: 14, fontWeight: 700, color: 'var(--text-dim)' }}>Ungrouped</span>
              <span style={{ fontSize: 12, color: 'var(--text-dim)' }}>{ungrouped.length} host{ungrouped.length !== 1 ? 's' : ''}</span>
            </div>
          )}
          <div className="hosts-grid">
            {ungrouped.map(renderHostCard)}
          </div>
        </div>
      )}

      {hosts.length === 0 && (
        <div className="card" style={{ textAlign: 'center', color: 'var(--text-dim)', padding: 40 }}>
          No hosts registered. Deploy the agent on your machines to get started.
        </div>
      )}

      {/* Manage Groups Modal */}
      {showManageGroups && (
        <Modal title="Manage Groups" onClose={() => setShowManageGroups(false)}>
          <div style={{ marginBottom: 16 }}>
            <div className="form-row">
              <div className="form-group" style={{ flex: 2 }}>
                <label className="form-label">New Group Name</label>
                <input className="input" placeholder="e.g., Proxmox Hosts"
                  value={newGroupName}
                  onChange={e => setNewGroupName(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && addGroup()}/>
              </div>
              <div className="form-group" style={{ flex: 0, minWidth: 80 }}>
                <label className="form-label">Color</label>
                <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap' }}>
                  {GROUP_COLORS.map(c => (
                    <div key={c} onClick={() => setNewGroupColor(c)} style={{
                      width: 24, height: 24, borderRadius: 4, background: c, cursor: 'pointer',
                      border: newGroupColor === c ? '2px solid white' : '2px solid transparent'
                    }}/>
                  ))}
                </div>
              </div>
              <div className="form-group" style={{ flex: 0, alignSelf: 'flex-end' }}>
                <button className="btn btn-primary" onClick={addGroup}>Add</button>
              </div>
            </div>
          </div>

          {groups.length > 0 && (
            <div className="table-wrap">
              <table>
                <thead><tr><th>Color</th><th>Name</th><th>Hosts</th><th>Actions</th></tr></thead>
                <tbody>
                  {groups.map(g => (
                    <tr key={g.id}>
                      <td><span style={{ display: 'inline-block', width: 16, height: 16, borderRadius: 3, background: g.color }}/></td>
                      <td style={{ fontWeight: 600 }}>{g.name}</td>
                      <td>{(grouped[g.id] || []).length}</td>
                      <td>
                        <button className="btn btn-sm btn-danger" onClick={() => deleteGroup(g.id)}>
                          <Icons.Trash/>
                        </button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}

          {groups.length === 0 && (
            <div style={{ textAlign: 'center', color: 'var(--text-dim)', padding: 20, fontSize: 13 }}>
              No groups yet. Create one above.
            </div>
          )}
        </Modal>
      )}

      {/* Assign Host to Group Modal */}
      {assigningHost && (
        <Modal title={`Assign: ${assigningHost.hostname}`} onClose={() => setAssigningHost(null)}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            <div
              onClick={() => assignHost(assigningHost.id, null)}
              style={{
                padding: '10px 14px', borderRadius: 6, cursor: 'pointer',
                background: !assigningHost.group_id ? 'rgba(59,130,246,0.1)' : 'var(--bg-input)',
                border: `1px solid ${!assigningHost.group_id ? 'var(--accent)' : 'var(--border)'}`,
                fontSize: 13
              }}>
              No group (ungrouped)
            </div>
            {groups.map(g => (
              <div key={g.id}
                onClick={() => assignHost(assigningHost.id, g.id)}
                style={{
                  padding: '10px 14px', borderRadius: 6, cursor: 'pointer',
                  display: 'flex', alignItems: 'center', gap: 10,
                  background: assigningHost.group_id === g.id ? 'rgba(59,130,246,0.1)' : 'var(--bg-input)',
                  border: `1px solid ${assigningHost.group_id === g.id ? 'var(--accent)' : 'var(--border)'}`,
                  fontSize: 13
                }}>
                <span style={{ width: 12, height: 12, borderRadius: 3, background: g.color, flexShrink: 0 }}/>
                {g.name}
              </div>
            ))}
          </div>
          {groups.length === 0 && (
            <div style={{ color: 'var(--text-dim)', fontSize: 13, marginTop: 12 }}>
              Create groups first via "Manage Groups" on the Hosts page.
            </div>
          )}
        </Modal>
      )}

      {/* Host Detail Modal */}
      {selectedHost && (
        <HostDetailModal host={selectedHost} onClose={() => setSelectedHost(null)} addToast={addToast}/>
      )}
    </div>
  );
}

// ── Actions Page ──────────────────────────────────────────
function ActionsPage({ hosts, addToast }) {
  const [selectedHosts, setSelectedHosts] = useState([]);
  const [showJobModal, setShowJobModal] = useState(null);
  const [jobParams, setJobParams] = useState({});
  const [groups, setGroups] = useState([]);
  const [trackedJobs, setTrackedJobs] = useState([]);
  const [modalJobs, setModalJobs] = useState([]);
  const outputRef = useRef(null);

  useEffect(() => { api('/api/groups').then(setGroups).catch(() => {}); }, []);

  // Poll tracked jobs (background panel)
  useEffect(() => {
    if (trackedJobs.length === 0) return;
    const hasActive = trackedJobs.some(j => ['pending','sent','running'].includes(j.status));
    if (!hasActive) return;
    const i = setInterval(async () => {
      const updated = await Promise.all(
        trackedJobs.map(j => api(`/api/jobs/${j.id}`).catch(() => j))
      );
      setTrackedJobs(updated);
    }, 2000);
    return () => clearInterval(i);
  }, [trackedJobs]);

  // Poll modal jobs (inside modal)
  useEffect(() => {
    if (modalJobs.length === 0) return;
    const hasActive = modalJobs.some(j => ['pending','sent','running'].includes(j.status));
    if (!hasActive) return;
    const i = setInterval(async () => {
      const updated = await Promise.all(
        modalJobs.map(j => api(`/api/jobs/${j.id}`).catch(() => j))
      );
      setModalJobs(updated);
    }, 2000);
    return () => clearInterval(i);
  }, [modalJobs]);

  // When closing modal, move modal jobs to background panel
  const closeModal = () => {
    if (modalJobs.length > 0) {
      setTrackedJobs(prev => [...modalJobs, ...prev]);
    }
    setModalJobs([]);
    setShowJobModal(null);
    setJobParams({});
  };

  const toggleHost = (id) => {
    setSelectedHosts(prev =>
      prev.includes(id) ? prev.filter(h => h !== id) : [...prev, id]
    );
  };

  const selectAll = () => setSelectedHosts(hosts.map(h => h.id));
  const selectNone = () => setSelectedHosts([]);
  const selectGroup = (groupId) => {
    const groupHostIds = hosts.filter(h => h.group_id === groupId).map(h => h.id);
    setSelectedHosts(prev => {
      const allSelected = groupHostIds.every(id => prev.includes(id));
      if (allSelected) return prev.filter(id => !groupHostIds.includes(id));
      return [...new Set([...prev, ...groupHostIds])];
    });
  };

  // Group hosts for display
  const grouped = {};
  const ungrouped = [];
  hosts.forEach(host => {
    const gid = host.group_id;
    if (gid && groups.find(g => g.id === gid)) {
      if (!grouped[gid]) grouped[gid] = [];
      grouped[gid].push(host);
    } else {
      ungrouped.push(host);
    }
  });

  const renderHostChip = (host) => (
    <div key={host.id}
      className="checkbox-row"
      onClick={() => toggleHost(host.id)}
      style={{
        background: selectedHosts.includes(host.id) ? 'rgba(59,130,246,0.1)' : 'var(--bg-input)',
        border: `1px solid ${selectedHosts.includes(host.id) ? 'var(--accent)' : 'var(--border)'}`,
        borderRadius: 6, padding: '6px 10px', fontSize: 12
      }}>
      <div className={`checkbox ${selectedHosts.includes(host.id) ? 'checked' : ''}`}>
        {selectedHosts.includes(host.id) && <span style={{ color: 'white', fontSize: 10 }}>✓</span>}
      </div>
      <span>{host.hostname}</span>
      <StatusBadge status={host.online ? 'online' : 'offline'}/>
    </div>
  );

  const submitJob = async (jobType) => {
    if (selectedHosts.length === 0) {
      addToast('Select at least one host.', 'error');
      return;
    }

    const meta = JOB_TYPES[jobType];
    let targetIds = [...selectedHosts];

    // Filter hosts by OS compatibility
    if (meta && meta.os !== 'all') {
      const compatible = [];
      const skipped = [];
      for (const hid of selectedHosts) {
        const h = hosts.find(x => x.id === hid);
        const isWin = (h?.os || '').toLowerCase().includes('windows');
        if (meta.os === 'windows' && !isWin) { skipped.push(h?.hostname || hid); }
        else if (meta.os === 'linux' && isWin) { skipped.push(h?.hostname || hid); }
        else { compatible.push(hid); }
      }
      if (skipped.length > 0) {
        addToast(`Skipped ${skipped.join(', ')} (not ${meta.os}). Running on ${compatible.length} compatible host(s).`, 'error');
      }
      if (compatible.length === 0) {
        addToast(`No ${meta.os} hosts selected. ${meta.label} requires ${meta.os}.`, 'error');
        return;
      }
      targetIds = compatible;
    }

    const res = await api('/api/jobs/batch', {
      method: 'POST',
      body: {
        host_ids: targetIds,
        type: jobType,
        params: jobParams
      }
    });

    // Add to modal jobs (shown inside the modal)
    const newJobs = res.map(j => ({ ...j, type: jobType, status: 'pending', result: '', error: '', hostname: hosts.find(h => h.id === j.host_id)?.hostname || j.host_id }));
    setModalJobs(prev => [...newJobs, ...prev]);
    setJobParams({});
  };

  const submitChain = async () => {
    const newJobs = [];
    for (const hid of selectedHosts) {
      const res = await api('/api/chains/proxmox-backup-all', {
        method: 'POST',
        body: {
          host_ids: [hid],
          script: jobParams.script || '/root/proxmox-vm-backup.sh',
          reboot_after: jobParams.reboot_after || false
        }
      });
      res.forEach(j => newJobs.push({ ...j, type: 'backup', status: 'pending', result: '', error: '', hostname: hosts.find(h => h.id === j.host_id)?.hostname || j.host_id }));
    }
    setModalJobs(prev => [...newJobs, ...prev]);
    setJobParams({});
  };

  return (
    <div>
      <div className="page-header">
        <div>
          <div className="page-title">Actions</div>
          <div className="page-desc">Run tasks across your hosts</div>
        </div>
      </div>

      {/* Host selector */}
      <div className="card">
        <div className="card-header">
          <span className="card-title">Select Hosts ({selectedHosts.length}/{hosts.length})</span>
          <div className="btn-group">
            <button className="btn btn-sm" onClick={selectAll}>All</button>
            <button className="btn btn-sm" onClick={selectNone}>None</button>
          </div>
        </div>

        {groups.map(group => {
          const groupHosts = grouped[group.id] || [];
          if (groupHosts.length === 0) return null;
          const allSelected = groupHosts.every(h => selectedHosts.includes(h.id));
          return (
            <div key={group.id} style={{ marginBottom: 12 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6, cursor: 'pointer' }}
                onClick={() => selectGroup(group.id)}>
                <span style={{ width: 10, height: 10, borderRadius: 2, background: group.color, flexShrink: 0 }}/>
                <span style={{ fontSize: 11, fontWeight: 700, color: 'var(--text-secondary)', textTransform: 'uppercase', letterSpacing: '0.5px' }}>
                  {group.name}
                </span>
                <span style={{ fontSize: 10, color: allSelected ? 'var(--accent)' : 'var(--text-dim)' }}>
                  {allSelected ? '(all selected)' : `(click to ${allSelected ? 'deselect' : 'select'} all)`}
                </span>
              </div>
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, paddingLeft: 18 }}>
                {groupHosts.map(renderHostChip)}
              </div>
            </div>
          );
        })}

        {ungrouped.length > 0 && (
          <div style={{ marginBottom: 8 }}>
            {groups.length > 0 && (
              <div style={{ marginBottom: 6 }}>
                <span style={{ fontSize: 11, fontWeight: 700, color: 'var(--text-dim)', textTransform: 'uppercase', letterSpacing: '0.5px' }}>
                  Ungrouped
                </span>
              </div>
            )}
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, paddingLeft: groups.length > 0 ? 18 : 0 }}>
              {ungrouped.map(renderHostChip)}
            </div>
          </div>
        )}
      </div>

      {/* Action tiles - filtered by selected host OS */}
      {(() => {
        const selHosts = hosts.filter(h => selectedHosts.includes(h.id));
        const hasWindows = selHosts.some(h => (h.os || '').toLowerCase().includes('windows'));
        const hasLinux = selHosts.some(h => !(h.os || '').toLowerCase().includes('windows'));
        const noSelection = selHosts.length === 0;
        return (
          <div className="actions-grid">
            {Object.entries(JOB_TYPES).map(([key, meta]) => {
              const show = noSelection || meta.os === 'all' ||
                (meta.os === 'windows' && hasWindows) ||
                (meta.os === 'linux' && hasLinux);
              if (!show) return null;
              const Icon = meta.icon;
              return (
                <div key={key} className="action-tile" onClick={() => {
                  if (selectedHosts.length === 0) { addToast('Select at least one host.', 'error'); return; }
                  if (meta.os === 'windows' && !hasWindows) { addToast('No Windows hosts selected.', 'error'); return; }
                  if (meta.os === 'linux' && !hasLinux) { addToast('No Linux hosts selected.', 'error'); return; }
                  setShowJobModal(key);
                }}>
                  <Icon/>
                  <div className="action-tile-label">{meta.label}</div>
                  <div className="action-tile-desc">{meta.os === 'all' ? 'All OS' : meta.os}</div>
                </div>
              );
            })}
            <div className="action-tile" onClick={() => setShowJobModal('_backup_chain')}>
              <Icons.HardDrive/>
              <div className="action-tile-label">Backup + Reboot Chain</div>
              <div className="action-tile-desc">Proxmox backup, reboot, autologin</div>
            </div>
          </div>
        );
      })()}

      {/* Job parameter modals */}
      {showJobModal && showJobModal !== '_backup_chain' && (
        <Modal title={`Run: ${JOB_TYPES[showJobModal]?.label}`} onClose={closeModal}>
          <div style={{ marginBottom: 16, color: 'var(--text-dim)', fontSize: 13 }}>
            Targets: {selectedHosts.length} host(s) selected
          </div>

          {showJobModal === 'windows_update' && (
            <div className="form-group" style={{ marginBottom: 16 }}>
              <div className="checkbox-row" onClick={() => setJobParams(p => ({ ...p, reboot: !p.reboot }))}>
                <div className={`checkbox ${jobParams.reboot ? 'checked' : ''}`}>
                  {jobParams.reboot && <span style={{ color: 'white', fontSize: 10 }}>✓</span>}
                </div>
                Reboot after update
              </div>
            </div>
          )}

          {showJobModal === 'linux_update' && (
            <div className="form-group" style={{ marginBottom: 16 }}>
              <div className="checkbox-row" onClick={() => setJobParams(p => ({ ...p, reboot: !p.reboot }))}>
                <div className={`checkbox ${jobParams.reboot ? 'checked' : ''}`}>
                  {jobParams.reboot && <span style={{ color: 'white', fontSize: 10 }}>✓</span>}
                </div>
                Reboot if required
              </div>
            </div>
          )}

          {showJobModal === 'docker_update' && (() => {
            const selHosts = hosts.filter(h => selectedHosts.includes(h.id));
            const allContainers = selHosts.flatMap(h => (h.system_info?.docker_containers || []).map(c => ({ host: h.hostname, name: c })));
            const selectedContainers = jobParams.containers || [];
            const toggleContainer = (name) => {
              const cur = jobParams.containers || [];
              setJobParams(p => ({ ...p, containers: cur.includes(name) ? cur.filter(c => c !== name) : [...cur, name] }));
            };
            return (
              <div style={{ marginBottom: 16 }}>
                <div className="form-group" style={{ marginBottom: 12 }}>
                  <label className="form-label">Containers</label>
                  <div style={{ fontSize: 10, color: 'var(--text-dim)', marginBottom: 6 }}>Select specific containers or leave all unchecked to update everything.</div>
                  <div style={{ maxHeight: 200, overflowY: 'auto', border: '1px solid var(--border)', borderRadius: 6, padding: 8, background: 'var(--bg-input)' }}>
                    {allContainers.length > 0 ? allContainers.map((c, i) => (
                      <div key={i} className="checkbox-row" onClick={() => toggleContainer(c.name)} style={{ marginBottom: 4 }}>
                        <div className={`checkbox ${selectedContainers.includes(c.name) ? 'checked' : ''}`}>
                          {selectedContainers.includes(c.name) && <span style={{ color: 'white', fontSize: 10 }}>✓</span>}
                        </div>
                        <span style={{ fontSize: 12, fontFamily: 'JetBrains Mono, monospace' }}>{c.name}</span>
                        <span style={{ fontSize: 10, color: 'var(--text-dim)' }}>({c.host})</span>
                      </div>
                    )) : <div style={{ fontSize: 12, color: 'var(--text-dim)' }}>No containers detected on selected hosts.</div>}
                  </div>
                </div>
                <div className="form-group">
                  <label className="form-label">Compose Directory (optional)</label>
                  <input className="input" placeholder="/root/docker-stacks/myapp"
                    value={jobParams.compose_dir || ''}
                    onChange={e => setJobParams(p => ({ ...p, compose_dir: e.target.value }))}/>
                </div>
                <div className="checkbox-row" onClick={() => setJobParams(p => ({ ...p, restart: p.restart === false ? true : (p.restart === true ? false : false) }))}
                  style={{ marginTop: 10 }}>
                  <div className={`checkbox ${jobParams.restart !== false ? 'checked' : ''}`}>
                    {jobParams.restart !== false && <span style={{ color: 'white', fontSize: 10 }}>✓</span>}
                  </div>
                  <span style={{ fontSize: 12 }}>Restart containers after pull (auto-detects compose project)</span>
                </div>
              </div>
            );
          })()}

          {showJobModal === 'backup' && (
            <div className="form-group" style={{ marginBottom: 16 }}>
              <label className="form-label">Backup Script Path</label>
              <input className="input" placeholder="/root/proxmox-vm-backup.sh"
                value={jobParams.script || ''}
                onChange={e => setJobParams(p => ({ ...p, script: e.target.value }))}/>
            </div>
          )}

          {showJobModal === 'autologin' && (() => {
            const selHost = hosts.find(h => selectedHosts.includes(h.id));
            const detectedDomain = selHost?.system_info?.domain || '';
            if (!jobParams._domainInit && detectedDomain) {
              setTimeout(() => setJobParams(p => ({ ...p, domain: detectedDomain, _domainInit: true })), 0);
            }
            return (
              <>
                <div className="form-row">
                  <div className="form-group">
                    <label className="form-label">Username</label>
                    <input className="input" placeholder="User Name"
                      value={jobParams.username || ''}
                      onChange={e => setJobParams(p => ({ ...p, username: e.target.value }))}/>
                  </div>
                  <div className="form-group">
                    <label className="form-label">Password</label>
                    <input className="input" type="password"
                      value={jobParams.password || ''}
                      onChange={e => setJobParams(p => ({ ...p, password: e.target.value }))}/>
                  </div>
                </div>
                <div className="form-group" style={{ marginBottom: 16 }}>
                  <label className="form-label">Domain {detectedDomain && <span style={{ color: 'var(--green)', fontSize: 10 }}>(auto-detected)</span>}</label>
                  <input className="input"
                    value={jobParams.domain || ''}
                    onChange={e => setJobParams(p => ({ ...p, domain: e.target.value }))}/>
                </div>
              </>
            );
          })()}

          {showJobModal === 'custom_command' && (
            <div className="form-group" style={{ marginBottom: 16 }}>
              <label className="form-label">Command</label>
              <textarea className="textarea" rows={3}
                placeholder="e.g., systemctl status nginx"
                value={jobParams.command || ''}
                onChange={e => setJobParams(p => ({ ...p, command: e.target.value }))}/>
            </div>
          )}

          {showJobModal === 'service_control' && (() => {
            const selHosts = hosts.filter(h => selectedHosts.includes(h.id));
            const allServices = [...new Set(selHosts.flatMap(h => h.system_info?.services || []))].sort();
            const selectedServices = jobParams.services || [];
            const toggleService = (name) => {
              const cur = jobParams.services || [];
              setJobParams(p => ({ ...p, services: cur.includes(name) ? cur.filter(s => s !== name) : [...cur, name] }));
            };
            return (
              <div style={{ marginBottom: 16 }}>
                <div className="form-group" style={{ marginBottom: 12 }}>
                  <label className="form-label">Services</label>
                  {allServices.length > 0 ? (
                    <div style={{ maxHeight: 200, overflowY: 'auto', border: '1px solid var(--border)', borderRadius: 6, padding: 8, background: 'var(--bg-input)' }}>
                      {allServices.map(s => (
                        <div key={s} className="checkbox-row" onClick={() => toggleService(s)} style={{ marginBottom: 3 }}>
                          <div className={`checkbox ${selectedServices.includes(s) ? 'checked' : ''}`}>
                            {selectedServices.includes(s) && <span style={{ color: 'white', fontSize: 10 }}>✓</span>}
                          </div>
                          <span style={{ fontSize: 12, fontFamily: 'JetBrains Mono, monospace' }}>{s}</span>
                        </div>
                      ))}
                    </div>
                  ) : (
                    <input className="input" placeholder="Service name (comma-separated for multiple)"
                      value={jobParams.service || ''}
                      onChange={e => setJobParams(p => ({ ...p, service: e.target.value }))}/>
                  )}
                </div>
                <div className="form-group">
                  <label className="form-label">Action</label>
                  <select className="select input"
                    value={jobParams.action || 'status'}
                    onChange={e => setJobParams(p => ({ ...p, action: e.target.value }))}>
                    <option value="status">Status</option>
                    <option value="start">Start</option>
                    <option value="stop">Stop</option>
                    <option value="restart">Restart</option>
                  </select>
                </div>
              </div>
            );
          })()}

          {showJobModal === 'reboot' && (
            <div className="form-group" style={{ marginBottom: 16 }}>
              <label className="form-label">Delay (seconds)</label>
              <input className="input" type="number" placeholder="30"
                value={jobParams.delay || 30}
                onChange={e => setJobParams(p => ({ ...p, delay: parseInt(e.target.value) || 30 }))}/>
            </div>
          )}

          {showJobModal === 'disk_cleanup' && (() => {
            const selHosts = hosts.filter(h => selectedHosts.includes(h.id));
            const hasWindows = selHosts.some(h => (h.os || '').toLowerCase().includes('windows'));
            const hasLinux = selHosts.some(h => !(h.os || '').toLowerCase().includes('windows'));
            const opts = jobParams.options || [];
            const toggleOpt = (opt) => {
              const cur = jobParams.options || [];
              setJobParams(p => ({ ...p, options: cur.includes(opt) ? cur.filter(o => o !== opt) : [...cur, opt] }));
            };
            return (
              <div style={{ marginBottom: 16 }}>
                {hasWindows && (
                  <div style={{ marginBottom: 12 }}>
                    <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--text-secondary)', marginBottom: 6 }}>Windows Cleanup</div>
                    {[
                      ['temp','Temp Files (User + System)'],
                      ['windows_update_cache','Windows Update Cache'],
                      ['recycle_bin','Recycle Bin'],
                      ['event_logs','Event Logs'],
                      ['prefetch','Prefetch Files'],
                      ['thumbnails','Thumbnail Cache'],
                      ['delivery_optimization','Delivery Optimization Cache'],
                      ['cbs_logs','CBS Logs (Component Store)'],
                      ['font_cache','Font Cache'],
                      ['error_reports','Windows Error Reports'],
                      ['installer_cache','Old Installer Cache ($WINDOWS.~BT)'],
                      ['memory_dumps','Memory Dump Files'],
                    ].map(([k,v]) => (
                      <div key={k} className="checkbox-row" onClick={() => toggleOpt(k)} style={{ marginBottom: 4 }}>
                        <div className={`checkbox ${opts.includes(k) ? 'checked' : ''}`}>
                          {opts.includes(k) && <span style={{ color: 'white', fontSize: 10 }}>✓</span>}
                        </div>
                        <span style={{ fontSize: 12 }}>{v}</span>
                      </div>
                    ))}
                  </div>
                )}
                {hasLinux && (
                  <div>
                    <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--text-secondary)', marginBottom: 6 }}>Linux Cleanup</div>
                    {[
                      ['apt_cache','APT Cache + Autoremove'],
                      ['journal','Journal Logs (older than 7d)'],
                      ['docker_prune','Docker Prune (images, volumes, networks)'],
                      ['tmp','Temp Files (/tmp)'],
                      ['old_kernels','Old Kernels'],
                      ['snap_cache','Snap Cache (old revisions)'],
                      ['pip_cache','Pip Cache'],
                      ['log_rotate','Force Log Rotation + Compress'],
                      ['coredumps','Core Dumps'],
                      ['thumbnail_cache','Thumbnail Cache (~/.cache/thumbnails)'],
                      ['trash','User Trash (~/.local/share/Trash)'],
                    ].map(([k,v]) => (
                      <div key={k} className="checkbox-row" onClick={() => toggleOpt(k)} style={{ marginBottom: 4 }}>
                        <div className={`checkbox ${opts.includes(k) ? 'checked' : ''}`}>
                          {opts.includes(k) && <span style={{ color: 'white', fontSize: 10 }}>✓</span>}
                        </div>
                        <span style={{ fontSize: 12 }}>{v}</span>
                      </div>
                    ))}
                  </div>
                )}
                <div style={{ fontSize: 10, color: 'var(--text-dim)', marginTop: 8 }}>Leave all unchecked to run everything.</div>
              </div>
            );
          })()}

          {showJobModal === 'file_browse' && (() => {
            const selHost = hosts.find(h => selectedHosts.includes(h.id));
            const isWin = (selHost?.os || '').toLowerCase().includes('windows');
            const defaultPath = isWin ? 'C:\\' : '/';
            const currentPath = jobParams.path || defaultPath;

            // Parse previous browse results for clickable navigation
            const lastBrowse = modalJobs.find(j => j.type === 'file_browse' && j.status === 'completed' && j.result);
            let entries = [];
            if (lastBrowse && lastBrowse.result) {
              try {
                entries = JSON.parse(lastBrowse.result);
                if (!Array.isArray(entries)) entries = [];
              } catch(e) {
                // Try to parse line-by-line listing
                entries = lastBrowse.result.split('\n').filter(l => l.trim()).map(l => {
                  const parts = l.trim().split(/\s+/);
                  const name = parts[parts.length - 1] || l.trim();
                  const isDir = l.startsWith('d') || l.includes('<DIR>') || name.endsWith('/') || name.endsWith('\\');
                  return { name: name.replace(/[\/\\]$/, ''), is_dir: isDir, size: '' };
                });
              }
            }

            const navigateTo = (dir) => {
              const sep = isWin ? '\\' : '/';
              let newPath;
              if (dir === '..') {
                const parts = currentPath.replace(/[\/\\]+$/, '').split(/[\/\\]/);
                parts.pop();
                newPath = parts.join(sep) || (isWin ? 'C:\\' : '/');
                if (isWin && !newPath.includes('\\')) newPath += '\\';
              } else {
                newPath = currentPath.replace(/[\/\\]+$/, '') + sep + dir;
              }
              setJobParams(p => ({ ...p, path: newPath }));
              // Auto-browse
              setTimeout(() => submitJob('file_browse'), 100);
            };

            return (
              <div style={{ marginBottom: 16 }}>
                <div className="form-group" style={{ marginBottom: 8 }}>
                  <label className="form-label">Path</label>
                  <div style={{ display: 'flex', gap: 6 }}>
                    <input className="input mono" placeholder={defaultPath} style={{ flex: 1 }}
                      value={currentPath}
                      onChange={e => setJobParams(p => ({ ...p, path: e.target.value }))}
                      onKeyDown={e => { if (e.key === 'Enter') submitJob('file_browse'); }}/>
                    <button className="btn btn-sm" onClick={() => navigateTo('..')} style={{ padding: '6px 10px' }}>Up</button>
                  </div>
                </div>

                {/* Directory listing from last browse result */}
                {entries.length > 0 && (
                  <div style={{ border: '1px solid var(--border)', borderRadius: 6, maxHeight: 250, overflowY: 'auto', background: 'var(--bg-input)' }}>
                    {entries.map((entry, i) => (
                      <div key={i} onClick={() => entry.is_dir && navigateTo(entry.name)} style={{
                        display: 'flex', alignItems: 'center', gap: 8, padding: '6px 12px',
                        borderBottom: '1px solid var(--border)', cursor: entry.is_dir ? 'pointer' : 'default',
                        fontSize: 12, fontFamily: 'JetBrains Mono, monospace',
                      }}>
                        <span style={{ color: entry.is_dir ? 'var(--accent)' : 'var(--text-dim)', fontSize: 14 }}>
                          {entry.is_dir ? '\uD83D\uDCC1' : '\uD83D\uDCC4'}
                        </span>
                        <span style={{ flex: 1, color: entry.is_dir ? 'var(--accent)' : 'var(--text-secondary)' }}>{entry.name}</span>
                        {entry.size && <span style={{ fontSize: 10, color: 'var(--text-dim)' }}>{entry.size}</span>}
                      </div>
                    ))}
                  </div>
                )}

                <div style={{ display: 'flex', gap: 6, marginTop: 8 }}>
                  <button className="btn btn-sm" onClick={() => {
                    setJobParams(p => ({ ...p, action: 'download', path: currentPath }));
                  }}><Icons.Download/> Download File</button>
                  <label className="btn btn-sm" style={{ cursor: 'pointer' }}>
                    <Icons.Download style={{ transform: 'rotate(180deg)' }}/> Upload File
                    <input type="file" style={{ display: 'none' }} onChange={e => {
                      if (e.target.files[0]) {
                        setJobParams(p => ({ ...p, upload_file: e.target.files[0].name, action: 'upload' }));
                        addToast('Upload queued. File transfers require agent v2+ support.', 'success');
                      }
                    }}/>
                  </label>
                </div>
                <div style={{ fontSize: 10, color: 'var(--text-dim)', marginTop: 6 }}>
                  Click folders to navigate. Press Enter or Execute to browse the current path.
                </div>
              </div>
            );
          })()}

          <div className="btn-group" style={{ justifyContent: 'flex-end', marginBottom: modalJobs.length > 0 ? 16 : 0 }}>
            <button className="btn" onClick={closeModal}>Close</button>
            <button className="btn btn-primary" onClick={() => submitJob(showJobModal)}>
              <Icons.Play/> Execute
            </button>
          </div>

          {/* Inline job output */}
          {modalJobs.length > 0 && (
            <div style={{ borderTop: '1px solid var(--border)', paddingTop: 12 }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--text-dim)', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: 8 }}>
                Output ({modalJobs.filter(j => ['pending','sent','running'].includes(j.status)).length} active)
              </div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 8, maxHeight: 400, overflowY: 'auto' }}>
                {modalJobs.map(job => (
                  <div key={job.id} style={{
                    background: 'var(--bg-primary)', border: '1px solid var(--border)',
                    borderRadius: 6, padding: 10,
                    borderLeftColor: job.status === 'completed' ? 'var(--green)' : job.status === 'failed' ? 'var(--red)' : job.status === 'running' ? 'var(--accent)' : 'var(--yellow)',
                    borderLeftWidth: 3
                  }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 4 }}>
                      <StatusBadge status={job.status}/>
                      <span style={{ fontSize: 11, color: 'var(--text-secondary)' }}>{job.hostname}</span>
                      <div style={{ marginLeft: 'auto', display: 'flex', gap: 4 }}>
                        {['pending','sent'].includes(job.status) && (
                          <button className="btn btn-sm" style={{ padding: '1px 6px', fontSize: 10 }}
                            onClick={async () => {
                              await api(`/api/jobs/${job.id}/cancel`, { method: 'POST' });
                              setModalJobs(prev => prev.map(j => j.id === job.id ? { ...j, status: 'cancelled' } : j));
                            }}>Cancel</button>
                        )}
                        {job.status === 'running' && (
                          <button className="btn btn-sm btn-danger" style={{ padding: '1px 6px', fontSize: 10 }}
                            onClick={async () => {
                              await api(`/api/jobs/${job.id}/cancel`, { method: 'POST' });
                              setModalJobs(prev => prev.map(j => j.id === job.id ? { ...j, status: 'cancelled' } : j));
                            }}>Stop</button>
                        )}
                        {(job.result || job.error) && (
                          <button className="btn btn-sm" style={{ padding: '1px 6px', fontSize: 10 }}
                            onClick={() => {
                              const blob = new Blob([job.result || job.error], { type: 'text/plain' });
                              const url = URL.createObjectURL(blob);
                              const a = document.createElement('a');
                              a.href = url; a.download = `${job.hostname}-${job.type}-${job.id.slice(0,8)}.log`;
                              a.click(); URL.revokeObjectURL(url);
                            }}>Download Log</button>
                        )}
                      </div>
                    </div>
                    {(job.result || job.error) && (
                      <div className="output-log" style={{ maxHeight: 150, fontSize: 10 }}>
                        {job.result || job.error}
                      </div>
                    )}
                    {['pending','sent','running'].includes(job.status) && !job.result && (
                      <div style={{ fontSize: 10, color: 'var(--text-dim)', fontStyle: 'italic' }}>
                        {job.status === 'running' ? 'Running...' : 'Queued...'}
                      </div>
                    )}
                  </div>
                ))}
              </div>
            </div>
          )}
        </Modal>
      )}

      {showJobModal === '_backup_chain' && (
        <Modal title="Backup + Reboot + Autologin Chain" onClose={closeModal}>
          <div style={{ marginBottom: 16, color: 'var(--text-dim)', fontSize: 13 }}>
            Runs backup script, then reboots, then configures autologin on Windows hosts.
          </div>
          <div className="form-group" style={{ marginBottom: 12 }}>
            <label className="form-label">Backup Script Path</label>
            <div style={{ display: 'flex', gap: 6 }}>
              <input className="input" placeholder="/root/proxmox-vm-backup.sh"
                value={jobParams.script || ''}
                onChange={e => setJobParams(p => ({ ...p, script: e.target.value }))}/>
              <button className="btn btn-sm" title="Browse remote filesystem" onClick={() => {
                if (selectedHosts.length > 0) {
                  setJobParams(p => ({ ...p, _browsing: true }));
                  submitJob('file_browse');
                }
              }}>Browse</button>
            </div>
          </div>
          <div className="form-group" style={{ marginBottom: 12 }}>
            <label className="form-label">Credentials (optional)</label>
            <select className="select input" style={{ fontSize: 12 }}
              value={jobParams._credId || ''}
              onChange={async e => {
                setJobParams(p => ({ ...p, _credId: e.target.value }));
              }}>
              <option value="">Use saved autologin credentials</option>
              {hosts.filter(h => selectedHosts.includes(h.id)).map(h => (
                <option key={h.id} value={h.id}>{h.hostname} credentials</option>
              ))}
            </select>
          </div>
          <div className="checkbox-row" onClick={() => setJobParams(p => ({ ...p, reboot_after: !p.reboot_after }))}
            style={{ marginBottom: 16 }}>
            <div className={`checkbox ${jobParams.reboot_after ? 'checked' : ''}`}>
              {jobParams.reboot_after && <span style={{ color: 'white', fontSize: 10 }}>✓</span>}
            </div>
            Reboot hosts after backup
          </div>
          <div className="btn-group" style={{ justifyContent: 'flex-end', marginBottom: modalJobs.length > 0 ? 16 : 0 }}>
            <button className="btn" onClick={closeModal}>Close</button>
            <button className="btn btn-primary" onClick={submitChain}><Icons.Play/> Run Chain</button>
          </div>

          {/* Inline job output */}
          {modalJobs.length > 0 && (
            <div style={{ borderTop: '1px solid var(--border)', paddingTop: 12 }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--text-dim)', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: 8 }}>
                Output ({modalJobs.filter(j => ['pending','sent','running'].includes(j.status)).length} active)
              </div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 8, maxHeight: 400, overflowY: 'auto' }}>
                {modalJobs.map(job => (
                  <div key={job.id} style={{
                    background: 'var(--bg-primary)', border: '1px solid var(--border)',
                    borderRadius: 6, padding: 10,
                    borderLeftColor: job.status === 'completed' ? 'var(--green)' : job.status === 'failed' ? 'var(--red)' : job.status === 'running' ? 'var(--accent)' : 'var(--yellow)',
                    borderLeftWidth: 3
                  }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 4 }}>
                      <StatusBadge status={job.status}/>
                      <span style={{ fontSize: 11, color: 'var(--text-secondary)' }}>{job.hostname}</span>
                    </div>
                    {(job.result || job.error) && (
                      <div className="output-log" style={{ maxHeight: 150, fontSize: 10 }}>
                        {job.result || job.error}
                      </div>
                    )}
                    {['pending','sent','running'].includes(job.status) && !job.result && (
                      <div style={{ fontSize: 10, color: 'var(--text-dim)', fontStyle: 'italic' }}>
                        {job.status === 'running' ? 'Running...' : 'Queued...'}
                      </div>
                    )}
                  </div>
                ))}
              </div>
            </div>
          )}
        </Modal>
      )}

      {/* Live Output Panel */}
      {trackedJobs.length > 0 && (
        <div ref={outputRef} className="card" style={{ marginTop: 8 }}>
          <div className="card-header">
            <span className="card-title">Job Output ({trackedJobs.filter(j => ['pending','sent','running'].includes(j.status)).length} active)</span>
            <div className="btn-group">
              <button className="btn btn-sm" onClick={() => setTrackedJobs([])}>Clear All</button>
            </div>
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {trackedJobs.map(job => (
              <div key={job.id} style={{
                background: 'var(--bg-primary)', border: '1px solid var(--border)',
                borderRadius: 6, padding: 12,
                borderLeftColor: job.status === 'completed' ? 'var(--green)' : job.status === 'failed' ? 'var(--red)' : job.status === 'running' ? 'var(--accent)' : 'var(--yellow)',
                borderLeftWidth: 3
              }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
                  <StatusBadge status={job.status}/>
                  <span style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 12, color: 'var(--text-primary)' }}>
                    {job.type}
                  </span>
                  <span style={{ fontSize: 11, color: 'var(--text-dim)' }}>
                    {job.hostname}
                  </span>
                  <div style={{ marginLeft: 'auto', display: 'flex', gap: 4 }}>
                    {['pending','sent'].includes(job.status) && (
                      <button className="btn btn-sm" style={{ padding: '2px 8px' }}
                        onClick={async () => {
                          await api(`/api/jobs/${job.id}/cancel`, { method: 'POST' });
                          setTrackedJobs(prev => prev.map(j => j.id === job.id ? { ...j, status: 'cancelled' } : j));
                        }}>Cancel</button>
                    )}
                    {job.status === 'running' && (
                      <button className="btn btn-sm btn-danger" style={{ padding: '2px 8px' }}
                        onClick={async () => {
                          await api(`/api/jobs/${job.id}/cancel`, { method: 'POST' });
                          setTrackedJobs(prev => prev.map(j => j.id === job.id ? { ...j, status: 'cancelled' } : j));
                        }}>Stop</button>
                    )}
                    {(job.result || job.error) && (
                      <button className="btn btn-sm" style={{ padding: '2px 8px' }}
                        onClick={() => {
                          const blob = new Blob([job.result || job.error], { type: 'text/plain' });
                          const url = URL.createObjectURL(blob);
                          const a = document.createElement('a');
                          a.href = url; a.download = `${job.hostname}-${job.type}-${job.id.slice(0,8)}.log`;
                          a.click(); URL.revokeObjectURL(url);
                        }}>Download</button>
                    )}
                  </div>
                </div>
                {(job.result || job.error) && (
                  <div className="output-log" style={{
                    maxHeight: 200, fontSize: 11,
                    borderColor: job.error ? 'var(--red)' : 'var(--border)'
                  }}>
                    {job.result || job.error}
                  </div>
                )}
                {['pending','sent','running'].includes(job.status) && !job.result && (
                  <div style={{ fontSize: 11, color: 'var(--text-dim)', fontStyle: 'italic' }}>
                    {job.status === 'running' ? 'Running, waiting for output...' : 'Queued, waiting for agent...'}
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ── Jobs Page ─────────────────────────────────────────────
function JobsPage({ hosts, addToast }) {
  const [jobs, setJobs] = useState([]);
  const [filter, setFilter] = useState('all');
  const [viewJob, setViewJob] = useState(null);

  const loadJobs = async () => {
    const data = await api('/api/jobs?limit=200');
    setJobs(data);
  };

  useEffect(() => { loadJobs(); const i = setInterval(loadJobs, 5000); return () => clearInterval(i); }, []);

  const cancelJob = async (id) => {
    await api(`/api/jobs/${id}/cancel`, { method: 'POST' });
    addToast('Job cancelled');
    loadJobs();
  };

  const filtered = filter === 'all' ? jobs : jobs.filter(j => j.status === filter);

  return (
    <div>
      <div className="page-header">
        <div>
          <div className="page-title">Jobs</div>
          <div className="page-desc">{jobs.length} total jobs</div>
        </div>
        <button className="btn" onClick={loadJobs}><Icons.RefreshCw/> Refresh</button>
      </div>

      <div className="tabs">
        {['all', 'running', 'pending', 'sent', 'completed', 'failed'].map(f => (
          <div key={f} className={`tab ${filter === f ? 'active' : ''}`} onClick={() => setFilter(f)}>
            {f} ({f === 'all' ? jobs.length : jobs.filter(j => j.status === f).length})
          </div>
        ))}
      </div>

      <div className="table-wrap">
        <table>
          <thead><tr>
            <th>Status</th><th>Type</th><th>Host</th><th>Created</th><th>Actions</th>
          </tr></thead>
          <tbody>
            {filtered.map(job => (
              <tr key={job.id}>
                <td><StatusBadge status={job.status}/></td>
                <td style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 12 }}>{job.type}</td>
                <td>{job.hostname || job.host_id?.slice(0, 8)}</td>
                <td style={{ fontSize: 12, color: 'var(--text-dim)' }}>{job.created_at}</td>
                <td>
                  <div className="btn-group">
                    <button className="btn btn-sm" onClick={() => setViewJob(job)}>
                      <Icons.Eye/> View
                    </button>
                    {['pending', 'sent'].includes(job.status) && (
                      <button className="btn btn-sm btn-danger" onClick={() => cancelJob(job.id)}>
                        <Icons.Stop/> Cancel
                      </button>
                    )}
                  </div>
                </td>
              </tr>
            ))}
            {filtered.length === 0 && (
              <tr><td colSpan={5} style={{ textAlign: 'center', padding: 30, color: 'var(--text-dim)' }}>
                No jobs found.
              </td></tr>
            )}
          </tbody>
        </table>
      </div>

      {viewJob && (
        <Modal title={`Job: ${viewJob.type}`} onClose={() => setViewJob(null)}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 12 }}>
            <StatusBadge status={viewJob.status}/>
            <span style={{ color: 'var(--text-dim)', fontSize: 12 }}>
              {viewJob.hostname} &middot; {viewJob.created_at}
            </span>
            <div style={{ marginLeft: 'auto', display: 'flex', gap: 6 }}>
              {['pending','sent'].includes(viewJob.status) && (
                <button className="btn btn-sm" onClick={async () => {
                  await cancelJob(viewJob.id);
                  setViewJob(v => ({ ...v, status: 'cancelled' }));
                }}>Cancel</button>
              )}
              {viewJob.status === 'running' && (
                <button className="btn btn-sm btn-danger" onClick={async () => {
                  await api(`/api/jobs/${viewJob.id}/cancel`, { method: 'POST' });
                  addToast('Kill signal sent');
                  setViewJob(v => ({ ...v, status: 'cancelled' }));
                  loadJobs();
                }}>
                  <Icons.Stop/> Kill
                </button>
              )}
              {(viewJob.result || viewJob.error) && (
                <button className="btn btn-sm" onClick={() => {
                  const blob = new Blob([viewJob.result || viewJob.error], { type: 'text/plain' });
                  const url = URL.createObjectURL(blob);
                  const a = document.createElement('a');
                  a.href = url; a.download = `${viewJob.hostname}-${viewJob.type}-${viewJob.id.slice(0,8)}.log`;
                  a.click(); URL.revokeObjectURL(url);
                }}>
                  <Icons.Download/> Download Log
                </button>
              )}
            </div>
          </div>
          {viewJob.params && viewJob.params !== '{}' && (
            <div style={{ marginBottom: 12 }}>
              <div className="form-label">Parameters</div>
              <div className="output-log">{JSON.stringify(JSON.parse(viewJob.params || '{}'), null, 2)}</div>
            </div>
          )}
          {viewJob.result && (
            <div style={{ marginBottom: 12 }}>
              <div className="form-label">Output</div>
              <div className="output-log">{viewJob.result}</div>
            </div>
          )}
          {viewJob.error && (
            <div>
              <div className="form-label" style={{ color: 'var(--red)' }}>Error</div>
              <div className="output-log" style={{ borderColor: 'var(--red)' }}>{viewJob.error}</div>
            </div>
          )}
        </Modal>
      )}
    </div>
  );
}

// ── Schedules Page ────────────────────────────────────────
function SchedulesPage({ hosts, addToast }) {
  const [schedules, setSchedules] = useState([]);
  const [showAdd, setShowAdd] = useState(false);
  const [form, setForm] = useState({ name: '', host_id: '', type: 'backup', cron: '0 1 * * 0', params: {} });

  const load = async () => { setSchedules(await api('/api/schedules')); };
  useEffect(() => { load(); }, []);

  const addSchedule = async () => {
    if (!form.name || !form.host_id || !form.cron) {
      addToast('Fill in all required fields.', 'error');
      return;
    }
    await api('/api/schedules', { method: 'POST', body: form });
    addToast(`Schedule "${form.name}" created`);
    setShowAdd(false);
    setForm({ name: '', host_id: '', type: 'backup', cron: '0 1 * * 0', params: {} });
    load();
  };

  const toggleSchedule = async (id, enabled) => {
    await api(`/api/schedules/${id}`, { method: 'PUT', body: { enabled: !enabled } });
    load();
  };

  const deleteSchedule = async (id) => {
    await api(`/api/schedules/${id}`, { method: 'DELETE' });
    addToast('Schedule deleted');
    load();
  };

  return (
    <div>
      <div className="page-header">
        <div>
          <div className="page-title">Crons / Scheduled Tasks</div>
          <div className="page-desc">Cron-based job scheduling</div>
        </div>
        <button className="btn btn-primary" onClick={() => setShowAdd(true)}>+ New Schedule</button>
      </div>

      <div className="table-wrap">
        <table>
          <thead><tr>
            <th>Enabled</th><th>Name</th><th>Type</th><th>Host</th><th>Cron</th><th>Next Run</th><th>Actions</th>
          </tr></thead>
          <tbody>
            {schedules.map(s => (
              <tr key={s.id}>
                <td>
                  <div className={`toggle ${s.enabled ? 'active' : ''}`}
                    onClick={() => toggleSchedule(s.id, s.enabled)}/>
                </td>
                <td style={{ fontWeight: 600 }}>{s.name}</td>
                <td><span className="mono" style={{ fontSize: 12 }}>{s.type}</span></td>
                <td>{s.hostname || s.host_id?.slice(0, 8)}</td>
                <td><code style={{ fontSize: 12, color: 'var(--accent)' }}>{s.cron}</code></td>
                <td style={{ fontSize: 12, color: 'var(--text-dim)' }}>{s.next_run?.slice(0, 19)}</td>
                <td>
                  <button className="btn btn-sm btn-danger" onClick={() => deleteSchedule(s.id)}>
                    <Icons.Trash/>
                  </button>
                </td>
              </tr>
            ))}
            {schedules.length === 0 && (
              <tr><td colSpan={7} style={{ textAlign: 'center', padding: 30, color: 'var(--text-dim)' }}>
                No schedules. Create one to automate jobs.
              </td></tr>
            )}
          </tbody>
        </table>
      </div>

      {showAdd && (
        <Modal title="New Schedule" onClose={() => setShowAdd(false)}>
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">Schedule Name</label>
              <input className="input" placeholder="Weekly LAB01 Backup"
                value={form.name} onChange={e => setForm(f => ({ ...f, name: e.target.value }))}/>
            </div>
          </div>
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">Host</label>
              <select className="select input" value={form.host_id}
                onChange={e => setForm(f => ({ ...f, host_id: e.target.value }))}>
                <option value="">Select host...</option>
                {hosts.map(h => <option key={h.id} value={h.id}>{h.hostname}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">Job Type</label>
              <select className="select input" value={form.type}
                onChange={e => setForm(f => ({ ...f, type: e.target.value }))}>
                {Object.entries(JOB_TYPES).map(([k, v]) => (
                  <option key={k} value={k}>{v.label}</option>
                ))}
              </select>
            </div>
          </div>
          <div className="form-group" style={{ marginBottom: 12 }}>
            <label className="form-label">Schedule</label>

            {/* Frequency selector */}

              {['daily','weekly','monthly','interval','custom'].map(freq => (
                <div key={freq} onClick={() => {
                  const defaults = { daily: '0 1 * * *', weekly: '0 1 * * 0', monthly: '0 1 1 * *', interval: '0 */6 * * *' };
                  setForm(f => ({ ...f, _freq: freq, cron: defaults[freq] || f.cron, _cronPreset: freq === 'custom' ? 'custom' : freq }));
                }} style={{
                  padding: '5px 12px', borderRadius: 4, fontSize: 12, fontWeight: 600, cursor: 'pointer',
                  background: (form._freq || 'custom') === freq ? 'var(--accent)' : 'var(--bg-input)',
                  color: (form._freq || 'custom') === freq ? 'white' : 'var(--text-secondary)',
                  border: `1px solid ${(form._freq || 'custom') === freq ? 'var(--accent)' : 'var(--border)'}`
                }}>{freq.charAt(0).toUpperCase() + freq.slice(1)}</div>
              ))}
            </div>

            {/* Time picker - shown for daily/weekly/monthly */}
            {['daily','weekly','monthly'].includes(form._freq) && (
              <div className="form-row" style={{ marginBottom: 10 }}>
                <div className="form-group">
                  <label className="form-label" style={{ fontSize: 10 }}>Hour</label>
                  <select className="select input" style={{ fontSize: 12 }} value={(() => {
                    const parts = (form.cron || '').split(' ');
                    return parts[1] || '1';
                  })()} onChange={e => {
                    const parts = (form.cron || '0 1 * * *').split(' ');
                    parts[1] = e.target.value;
                    setForm(f => ({ ...f, cron: parts.join(' ') }));
                  }}>
                    {Array.from({length: 24}, (_, i) => (
                      <option key={i} value={String(i)}>{i === 0 ? '12 AM' : i < 12 ? `${i} AM` : i === 12 ? '12 PM' : `${i-12} PM`}</option>
                    ))}
                  </select>
                </div>
                <div className="form-group">
                  <label className="form-label" style={{ fontSize: 10 }}>Minute</label>
                  <select className="select input" style={{ fontSize: 12 }} value={(() => {
                    const parts = (form.cron || '').split(' ');
                    return parts[0] || '0';
                  })()} onChange={e => {
                    const parts = (form.cron || '0 1 * * *').split(' ');
                    parts[0] = e.target.value;
                    setForm(f => ({ ...f, cron: parts.join(' ') }));
                  }}>
                    {[0,5,10,15,20,25,30,35,40,45,50,55].map(m => (
                      <option key={m} value={String(m)}>{String(m).padStart(2,'0')}</option>
                    ))}
                  </select>
                </div>
              </div>
            )}

            {/* Day picker for weekly */}
            {form._freq === 'weekly' && (
              <div style={{ marginBottom: 10 }}>
                <label className="form-label" style={{ fontSize: 10, marginBottom: 4 }}>Day of Week</label>
                <div style={{ display: 'flex', gap: 4 }}>
                  {['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map((d, i) => {
                    const parts = (form.cron || '0 1 * * 0').split(' ');
                    const selected = (parts[4] || '0').split(',').includes(String(i));
                    return (
                      <div key={i} onClick={() => {
                        const parts = (form.cron || '0 1 * * 0').split(' ');
                        let days = (parts[4] || '0').split(',').filter(x => x !== '*' && x !== '');
                        if (selected) days = days.filter(x => x !== String(i));
                        else days.push(String(i));
                        if (days.length === 0) days = ['0'];
                        parts[4] = days.join(',');
                        setForm(f => ({ ...f, cron: parts.join(' ') }));
                      }} style={{
                        width: 36, height: 32, borderRadius: 4, display: 'flex', alignItems: 'center', justifyContent: 'center',
                        fontSize: 11, fontWeight: 600, cursor: 'pointer',
                        background: selected ? 'var(--accent)' : 'var(--bg-input)',
                        color: selected ? 'white' : 'var(--text-secondary)',
                        border: `1px solid ${selected ? 'var(--accent)' : 'var(--border)'}`
                      }}>{d}</div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* Day of month for monthly */}
            {form._freq === 'monthly' && (
              <div style={{ marginBottom: 10 }}>
                <label className="form-label" style={{ fontSize: 10, marginBottom: 4 }}>Day of Month</label>
                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 3 }}>
                  {Array.from({length: 28}, (_, i) => i + 1).map(d => {
                    const parts = (form.cron || '0 1 1 * *').split(' ');
                    const selected = parts[2] === String(d);
                    return (
                      <div key={d} onClick={() => {
                        const parts = (form.cron || '0 1 1 * *').split(' ');
                        parts[2] = String(d);
                        setForm(f => ({ ...f, cron: parts.join(' ') }));
                      }} style={{
                        width: 28, height: 28, borderRadius: 4, display: 'flex', alignItems: 'center', justifyContent: 'center',
                        fontSize: 10, fontWeight: 600, cursor: 'pointer',
                        background: selected ? 'var(--accent)' : 'var(--bg-input)',
                        color: selected ? 'white' : 'var(--text-secondary)',
                        border: `1px solid ${selected ? 'var(--accent)' : 'var(--border)'}`
                      }}>{d}</div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* Interval picker */}
            {form._freq === 'interval' && (
              <div className="form-row" style={{ marginBottom: 10 }}>
                <div className="form-group">
                  <label className="form-label" style={{ fontSize: 10 }}>Every</label>
                  <select className="select input" style={{ fontSize: 12 }} value={form._interval || '6h'} onChange={e => {
                    const map = { '15m': '*/15 * * * *', '30m': '*/30 * * * *', '1h': '0 * * * *', '2h': '0 */2 * * *', '4h': '0 */4 * * *', '6h': '0 */6 * * *', '8h': '0 */8 * * *', '12h': '0 */12 * * *' };
                    setForm(f => ({ ...f, _interval: e.target.value, cron: map[e.target.value] || f.cron }));
                  }}>
                    <option value="15m">15 minutes</option>
                    <option value="30m">30 minutes</option>
                    <option value="1h">1 hour</option>
                    <option value="2h">2 hours</option>
                    <option value="4h">4 hours</option>
                    <option value="6h">6 hours</option>
                    <option value="8h">8 hours</option>
                    <option value="12h">12 hours</option>
                  </select>
                </div>
              </div>
            )}

            {/* Raw cron display/edit */}
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginTop: 4 }}>
              <code style={{ fontSize: 12, color: 'var(--accent)', background: 'var(--bg-input)', padding: '4px 10px', borderRadius: 4, border: '1px solid var(--border)', flex: 1, fontFamily: 'JetBrains Mono, monospace' }}>
                {form.cron || '0 1 * * 0'}
              </code>
              {form._freq !== 'custom' && <span style={{ fontSize: 10, color: 'var(--text-dim)' }}>auto-generated</span>}
            </div>
            {form._freq === 'custom' && (
              <input className="input mono" placeholder="0 1 * * 0" style={{ fontSize: 12, marginTop: 6 }}
                value={form.cron} onChange={e => setForm(f => ({ ...f, cron: e.target.value }))}/>
            )}
            <div style={{ fontSize: 10, color: 'var(--text-dim)', marginTop: 4 }}>
              Works for both Linux cron and Windows Task Scheduler. Format: min hour day month weekday
            </div>
          </div>

          {form.type === 'backup' && (
            <div className="form-group" style={{ marginBottom: 12 }}>
              <label className="form-label">Script Path</label>
              <div style={{ display: 'flex', gap: 6 }}>
                <input className="input" placeholder="/root/proxmox-vm-backup.sh"
                  value={form.params.script || ''}
                  onChange={e => setForm(f => ({ ...f, params: { ...f.params, script: e.target.value } }))}/>
                <button className="btn btn-sm" title="Browse remote path" onClick={() => {
                  if (form.host_id) {
                    api('/api/jobs', { method: 'POST', body: { host_id: form.host_id, type: 'file_browse', params: { path: form.params.script ? form.params.script.replace(/[^\/\\]*$/, '') : '/' } }});
                    addToast('Browse job sent. Check Jobs tab for result.');
                  } else { addToast('Select a host first.', 'error'); }
                }}>Browse</button>
              </div>
              <div style={{ fontSize: 10, color: 'var(--text-dim)', marginTop: 4 }}>Path to the backup script on the remote host.</div>
            </div>
          )}

          {form.type === 'custom_command' && (
            <div className="form-group" style={{ marginBottom: 12 }}>
              <label className="form-label">Command or Script Path</label>
              <textarea className="textarea"
                value={form.params.command || ''}
                onChange={e => setForm(f => ({ ...f, params: { ...f.params, command: e.target.value } }))}/>
              <div style={{ fontSize: 10, color: 'var(--text-dim)', marginTop: 4 }}>Enter a command, script path, or paste a multi-line script.</div>
            </div>
          )}

          {['autologin', 'backup'].includes(form.type) && (
            <div className="form-group" style={{ marginBottom: 12 }}>
              <label className="form-label">Run As (saved credential)</label>
              <select className="select input" style={{ fontSize: 12 }}
                value={form.params._credId || ''}
                onChange={e => setForm(f => ({ ...f, params: { ...f.params, _credId: e.target.value } }))}>
                <option value="">Default (no credential override)</option>
                {hosts.filter(h => h.id === form.host_id).map(h => (
                  <option key={h.id} value={h.id}>{h.hostname} saved credentials</option>
                ))}
              </select>
            </div>
          )}

          <div className="btn-group" style={{ justifyContent: 'flex-end' }}>
            <button className="btn" onClick={() => setShowAdd(false)}>Cancel</button>
            <button className="btn btn-primary" onClick={addSchedule}>Create Schedule</button>
          </div>
        </Modal>
      )}
    </div>
  );
}
